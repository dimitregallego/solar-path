<body class="bg-[#0f1117] text-slate-200">
<div id="root"></div>
<script type="module">
import{createElement as h,useState,useEffect,useRef,useMemo}from'https://esm.sh/react@18';
import{createRoot}from'https://esm.sh/react-dom@18/client';
import{giraffeState,rpc}from'https://esm.sh/@gi-nx/iframe-sdk@latest';
import*as turf from'https://esm.sh/@turf/turf@6.5.0';

// ═══════════════════════════════════════════════════════════════════
// MOTOR SOLAR — NOAA/Meeus/Ladybug
// ═══════════════════════════════════════════════════════════════════
const D2R=Math.PI/180,R2D=180/Math.PI;
const MCOLORS=['#fff7ad','#ffe491','#ffd175','#ffbe59','#ffaa3d','#ff9621','#ff8205','#f26e00','#e55a00','#d84600','#cc3200','#bf1e00'];
function julianDay(d,h,y=2000){const l=(y%4===0&&y%100!==0)||y%400===0;const m=[0,31,l?29:28,31,30,31,30,31,31,30,31,30,31];let mo=1,r=d;while(r>m[mo]&&mo<12){r-=m[mo];mo++;}let Y=y,M=mo;if(M<=2){Y--;M+=12;}const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+r+B-1524.5+h/24;}
function calcSun(lat,lng,doy,hr){const JD=julianDay(doy,hr),T=(JD-2451545)/36525;let L0=280.46646+T*(36000.76983+T*0.0003032);L0=((L0%360)+360)%360;let M=357.52911+T*(35999.05029-0.0001537*T);M=((M%360)+360)%360;const Mr=M*D2R,e=0.016708634-T*(0.000042037+0.0000001267*T);const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);const sl=L0+C,om=125.04-1934.136*T,la=sl-0.00569-0.00478*Math.sin(om*D2R);const e0=23+(26+(21.448-T*(46.815+T*(0.00059-T*0.001813)))/60)/60,ep=e0+0.00256*Math.cos(om*D2R),er=ep*D2R;const dec=Math.asin(Math.max(-1,Math.min(1,Math.sin(er)*Math.sin(la*D2R))))*R2D;const y2=Math.pow(Math.tan(er/2),2),L0r=L0*D2R;const eot=4*R2D*(y2*Math.sin(2*L0r)-2*e*Math.sin(Mr)+4*e*y2*Math.sin(Mr)*Math.cos(2*L0r)-0.5*y2*y2*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));const tz=Math.round(lng/15);let tst=(hr*60+eot+4*lng-60*tz);tst=((tst%1440)+1440)%1440;const sn=(720-4*lng-eot+tz*60)/60,ha=(tst/4)-180,har=ha*D2R,latr=lat*D2R,decr=dec*D2R;const cosZ=Math.sin(latr)*Math.sin(decr)+Math.cos(latr)*Math.cos(decr)*Math.cos(har);const zen=Math.acos(Math.max(-1,Math.min(1,cosZ)))*R2D,alt=90-zen;const sinZ=Math.sin(zen*D2R);let az;if(Math.abs(sinZ)<1e-10){az=lat>=0?180:0;}else{const ca=(Math.sin(latr)*cosZ-Math.sin(decr))/(Math.cos(latr)*sinZ);const ar=Math.acos(Math.max(-1,Math.min(1,ca)));az=ha>0?(ar*R2D+180)%360:(540-ar*R2D)%360;}return{alt,az,sn,day:alt>-0.83};}

function hex2rgb(hex){return[parseInt(hex.slice(1,3),16)/255,parseInt(hex.slice(3,5),16)/255,parseInt(hex.slice(5,7),16)/255];}

// ═══════════════════════════════════════════════════════════════════
// GERADOR DE GLB — Carta Solar 3D estática
//
// Gera a geometria completa da cúpula Ladybug como GLB binário:
//  - 12 arcos mensais (cores do gradiente jan→dez)
//  - 11 curvas de analema (8h–18h, azul)
//  - 8 anéis de altitude flutuantes (gaiola 3D, cinza)
//  - 3 anéis no chão (0°/30°/60°, branco)
//  - 36 linhas de azimute (a cada 10°, branco/cinza)
//
// Coordenadas LOCAL em metros: X=Leste, Y=Norte, Z=Cima
// Conversão para glTF (Y-up): gX=X, gY=Z, gZ=-Y
// ═══════════════════════════════════════════════════════════════════

function buildRibbon(pts, halfW=0.03, vertical=true) {
  if(pts.length<2) return null;
  const pos=[],idx=[];
  let minX=1e9,minY=1e9,minZ=1e9,maxX=-1e9,maxY=-1e9,maxZ=-1e9;
  for(let i=0;i<pts.length;i++){
    const p=pts[i]; let ox,oy,oz;
    if(vertical){ox=0;oy=0;oz=halfW;}
    else{
      let dx,dy;
      if(i<pts.length-1){dx=pts[i+1][0]-p[0];dy=pts[i+1][1]-p[1];}
      else{dx=p[0]-pts[i-1][0];dy=p[1]-pts[i-1][1];}
      const ln=Math.sqrt(dx*dx+dy*dy)||1;
      ox=-dy/ln*halfW;oy=dx/ln*halfW;oz=0;
    }
    // glTF Y-up: gX=localX, gY=localZ, gZ=-localY
    const ax=p[0]+ox, ay=p[2]+oz, az=-(p[1]+oy);
    const bx=p[0]-ox, by=p[2]-oz, bz=-(p[1]-oy);
    pos.push(ax,ay,az,bx,by,bz);
    for(const[x,y,z]of[[ax,ay,az],[bx,by,bz]]){
      if(x<minX)minX=x;if(x>maxX)maxX=x;
      if(y<minY)minY=y;if(y>maxY)maxY=y;
      if(z<minZ)minZ=z;if(z>maxZ)maxZ=z;
    }
    if(i>0){const b2=(i-1)*2,c=i*2;idx.push(b2,b2+1,c+1,b2,c+1,c);}
  }
  return{positions:new Float32Array(pos),indices:new Uint16Array(idx),min:[minX,minY,minZ],max:[maxX,maxY,maxZ]};
}

function mergeRibbons(ribbons){
  if(!ribbons.length)return null;
  let tP=0,tI=0;for(const r of ribbons){tP+=r.positions.length;tI+=r.indices.length;}
  const P=new Float32Array(tP),I=new Uint16Array(tI);
  let pO=0,iO=0,vO=0,mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];
  for(const r of ribbons){
    P.set(r.positions,pO);
    for(let i=0;i<r.indices.length;i++)I[iO+i]=r.indices[i]+vO;
    pO+=r.positions.length;iO+=r.indices.length;vO+=r.positions.length/3;
    for(let j=0;j<3;j++){mn[j]=Math.min(mn[j],r.min[j]);mx[j]=Math.max(mx[j],r.max[j]);}
  }
  return{positions:P,indices:I,min:mn,max:mx};
}

function generateGLBGeometry(lat, lng, radius) {
  const groups = [];  // {color:[r,g,b], positions, indices, min, max}
  const seasonSteps = lat<0?[355,17,46,79,107,137,172,199,229,266,292,321]:[172,199,229,266,292,321,355,17,46,79,107,137];

  // ── 12 arcos mensais ──────────────────────────────────────────
  for(let m=0;m<12;m++){
    const doy=seasonSteps[m],pts=[];
    for(let h=0;h<=24;h+=0.15){
      const s=calcSun(lat,lng,doy,h);if(!s.day&&s.alt<-1)continue;
      const a=s.alt*D2R,z=s.az*D2R;
      pts.push([radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),Math.max(0,radius*Math.sin(a))]);
    }
    if(pts.length>1){const rb=buildRibbon(pts,0.08,true);if(rb){rb.color=hex2rgb(MCOLORS[m]);groups.push(rb);}}
  }

  // ── 11 analemas (8h–18h) ──────────────────────────────────────
  const anaRibbons=[];
  for(let h=8;h<=18;h+=1){
    const pts=[];
    for(let d=1;d<=365;d+=2){
      const s=calcSun(lat,lng,d,h);if(!s.day||s.alt<=0)continue;
      const a=s.alt*D2R,z=s.az*D2R;
      pts.push([radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),Math.max(0,radius*Math.sin(a))]);
    }
    if(pts.length>2){pts.push(pts[0]);const rb=buildRibbon(pts,0.06,true);if(rb)anaRibbons.push(rb);}
  }
  if(anaRibbons.length){const merged=mergeRibbons(anaRibbons);merged.color=[0.25,0.63,1.0];groups.push(merged);}

  // ── 8 anéis de altitude 3D (gaiola flutuante) ─────────────────
  const domeRibbons=[];
  for(const alt of [10,20,30,40,50,60,70,80]){
    const rr=radius*Math.cos(alt*D2R),zz=radius*Math.sin(alt*D2R);
    if(rr<1)continue;const pts=[];
    for(let i=0;i<=90;i++){const t=(i/90)*2*Math.PI;pts.push([rr*Math.sin(t),rr*Math.cos(t),zz]);}
    const rb=buildRibbon(pts,0.05,true);if(rb)domeRibbons.push(rb);
  }
  if(domeRibbons.length){const merged=mergeRibbons(domeRibbons);merged.color=[0.45,0.45,0.45];groups.push(merged);}

  // ── Compasso no chão (anéis 0°/30°/60° + radiais) ────────────
  const compassRibbons=[];
  for(const alt of [0,30,60]){
    const rr=radius*Math.cos(alt*D2R);if(rr<1)continue;const pts=[];
    for(let i=0;i<=90;i++){const t=(i/90)*2*Math.PI;pts.push([rr*Math.sin(t),rr*Math.cos(t),0]);}
    const rb=buildRibbon(pts,alt===0?0.10:0.06,false);if(rb)compassRibbons.push(rb);
  }
  for(let az=0;az<360;az+=10){
    const azr=az*D2R;
    const pts=[[0,0,0],[radius*Math.sin(azr),radius*Math.cos(azr),0]];
    const rb=buildRibbon(pts,az%90===0?0.08:0.04,false);if(rb)compassRibbons.push(rb);
  }
  if(compassRibbons.length){const merged=mergeRibbons(compassRibbons);merged.color=[1,1,1];groups.push(merged);}

  return groups;
}

function buildGLB(groups) {
  // Calcular tamanho do buffer binário
  let totalBin=0; const offsets=[];
  for(const g of groups){
    const pOff=totalBin; totalBin+=g.positions.byteLength; totalBin=(totalBin+3)&~3;
    const iOff=totalBin; totalBin+=g.indices.byteLength;  totalBin=(totalBin+3)&~3;
    offsets.push({pOff,pLen:g.positions.byteLength,iOff,iLen:g.indices.byteLength});
  }

  // Preencher buffer binário
  const binBuf=new ArrayBuffer(totalBin),binU8=new Uint8Array(binBuf);
  for(let i=0;i<groups.length;i++){
    binU8.set(new Uint8Array(groups[i].positions.buffer,groups[i].positions.byteOffset,groups[i].positions.byteLength),offsets[i].pOff);
    binU8.set(new Uint8Array(groups[i].indices.buffer,groups[i].indices.byteOffset,groups[i].indices.byteLength),offsets[i].iOff);
  }

  // Montar JSON do glTF
  const bv=[],acc=[],meshes=[],mats=[],nodes=[];
  let bvI=0,acI=0;
  for(let i=0;i<groups.length;i++){
    const g=groups[i],o=offsets[i];
    mats.push({pbrMetallicRoughness:{baseColorFactor:[...g.color,0.85],metallicFactor:0,roughnessFactor:0.9},doubleSided:true,alphaMode:'BLEND'});
    bv.push({buffer:0,byteOffset:o.pOff,byteLength:o.pLen,target:34962});
    bv.push({buffer:0,byteOffset:o.iOff,byteLength:o.iLen,target:34963});
    acc.push({bufferView:bvI,componentType:5126,count:g.positions.length/3,type:'VEC3',min:g.min.map(v=>+v.toFixed(4)),max:g.max.map(v=>+v.toFixed(4))});
    acc.push({bufferView:bvI+1,componentType:5123,count:g.indices.length,type:'SCALAR'});
    meshes.push({primitives:[{attributes:{POSITION:acI},indices:acI+1,material:i}]});
    nodes.push({mesh:i});
    bvI+=2;acI+=2;
  }

  const gltf={asset:{version:'2.0',generator:'KV Sun Path vG15'},scene:0,scenes:[{nodes:nodes.map((_,i)=>i)}],nodes,meshes,accessors:acc,bufferViews:bv,buffers:[{byteLength:totalBin}],materials:mats};
  let jsonStr=JSON.stringify(gltf);while(jsonStr.length%4!==0)jsonStr+=' ';
  const jsonBytes=new TextEncoder().encode(jsonStr);

  // Montar GLB binário
  const totalLen=12+8+jsonBytes.length+8+totalBin;
  const glb=new ArrayBuffer(totalLen),dv=new DataView(glb);
  dv.setUint32(0,0x46546C67,true);dv.setUint32(4,2,true);dv.setUint32(8,totalLen,true);
  dv.setUint32(12,jsonBytes.length,true);dv.setUint32(16,0x4E4F534A,true);
  new Uint8Array(glb,20).set(jsonBytes);
  const bs=20+jsonBytes.length;
  dv.setUint32(bs,totalBin,true);dv.setUint32(bs+4,0x004E4942,true);
  new Uint8Array(glb,bs+8).set(binU8);

  return new Blob([glb],{type:'model/gltf-binary'});
}

function downloadSolarGLB(lat, lng, radius) {
  console.log(`[SunPath] Gerando GLB... lat=${lat.toFixed(4)} lng=${lng.toFixed(4)} r=${radius}m`);
  const groups = generateGLBGeometry(lat, lng, radius);
  console.log(`[SunPath] ${groups.length} mesh groups gerados`);
  const blob = buildGLB(groups);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`sun-path-${Math.abs(lat).toFixed(1)}${lat<0?'S':'N'}-r${radius}m.glb`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  console.log(`[SunPath] ✓ GLB baixado (${(blob.size/1024).toFixed(0)} KB)`);
}

// ═══════════════════════════════════════════════════════════════════
// GIRAFFE — Layers dinâmicos (só arco diário + sol)
// ═══════════════════════════════════════════════════════════════════
const L={DOT:'sp-dot',POLE:'sp-pole',ARC:'sp-arc'};
const local2geo=(x,y,oLng,oLat)=>[oLng+x/(111320*Math.cos(oLat*D2R)),oLat+y/111320];
const fc=f=>({type:'FeatureCollection',features:f});
const rm=async id=>{try{await rpc.invoke('removeTempLayer',[id]);}catch{}};
const rmAll=()=>Promise.allSettled(Object.values(L).map(rm));

async function syncGiraffeSun(az,alt){
  if(alt<-5)return{ok:false,why:'night'};
  const views=giraffeState.get('views')||[];if(!views.length)return{ok:false,why:'no_views'};
  let sv;try{sv=JSON.parse(JSON.stringify(views[0]));}catch{sv={id:views[0].id};}
  try{await rpc.invoke('activateViewLayers',[{...sv,sun:{...(sv.sun||{}),azimuth:az,altitude:alt},sunAzimuth:az,sunAltitude:alt}]);return{ok:true};}
  catch{return{ok:false,why:'error'};}
}

// Arco do dia atual — fill-extrusion (midZ ± 4cm, amarelo)
async function plotDailyArc(lat,lng,doy,radius){
  await rm(L.ARC);
  const segs=[];
  const pts=[];
  for(let h=0;h<=24;h+=0.15){
    const s=calcSun(lat,lng,doy,h);if(!s.day&&s.alt<-1)continue;
    const a=s.alt*D2R,z=s.az*D2R;
    const[ln,la]=local2geo(radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),lng,lat);
    pts.push([ln,la,Math.max(0,radius*Math.sin(a))]);
  }
  if(pts.length<2)return;
  for(let i=0;i<pts.length-1;i++){
    const p1=pts[i],p2=pts[i+1];if(p1[2]<-1&&p2[2]<-1)continue;
    const line=turf.lineString([[p1[0],p1[1]],[p2[0],p2[1]]]);
    const poly=turf.buffer(line,0.10,{units:'meters'});
    if(poly){const midZ=Math.max(0,(p1[2]+p2[2])/2);poly.properties={color:'#F59E0B',_baseHeight:Math.max(0,midZ-0.04),_height:midZ+0.04,_opacity:0.9};segs.push(poly);}
  }
  if(!segs.length)return;
  await rpc.invoke('addTempLayerGeoJSON',[L.ARC,fc(segs),{type:'fill-extrusion',paint:{'fill-extrusion-color':['get','color'],'fill-extrusion-base':['get','_baseHeight'],'fill-extrusion-height':['get','_height'],'fill-extrusion-opacity':['get','_opacity']}}]);
}

async function plotSunDot(lat,lng,doy,hr,radius){
  await rm(L.DOT);await rm(L.POLE);
  const s=calcSun(lat,lng,doy,hr);if(!s.day)return;
  const a=s.alt*D2R,z=s.az*D2R,coordZ=Math.max(0,radius*Math.sin(a));
  const[sLng,sLat]=local2geo(radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),lng,lat);
  const col=s.alt>20?'#F59E0B':'#D97706';
  const pole=turf.buffer(turf.lineString([[sLng,sLat],[sLng,sLat]]),0.25,{units:'meters'});
  pole.properties={color:col,_baseHeight:0,_height:coordZ,_opacity:0.5};
  await rpc.invoke('addTempLayerGeoJSON',[L.POLE,fc([pole]),{type:'fill-extrusion',paint:{'fill-extrusion-color':['get','color'],'fill-extrusion-base':['get','_baseHeight'],'fill-extrusion-height':['get','_height'],'fill-extrusion-opacity':['get','_opacity']}}]);
  const dot=turf.buffer(turf.point([sLng,sLat]),2.5,{units:'meters'});
  dot.properties={color:col,_baseHeight:coordZ,_height:coordZ+3,_opacity:1};
  await rpc.invoke('addTempLayerGeoJSON',[L.DOT,fc([dot]),{type:'fill-extrusion',paint:{'fill-extrusion-color':['get','color'],'fill-extrusion-base':['get','_baseHeight'],'fill-extrusion-height':['get','_height'],'fill-extrusion-opacity':['get','_opacity']}}]);
}

// ═══════════════════════════════════════════════════════════════════
// CARTA SOLAR SVG (inline, sem RPC)
// ═══════════════════════════════════════════════════════════════════
const SR=85,SCX=100,SCY=100;
const sun2svg=(alt,az)=>{const r=SR*Math.cos(alt*D2R);return[SCX+r*Math.sin(az*D2R),SCY-r*Math.cos(az*D2R)];};
function buildArcPath(lat,lng,doy){const pts=[];for(let h=0;h<=24;h+=0.2){const s=calcSun(lat,lng,doy,h);if(!s.day||s.alt<0)continue;const[x,y]=sun2svg(s.alt,s.az);pts.push(pts.length===0?`M${x.toFixed(1)},${y.toFixed(1)}`:`L${x.toFixed(1)},${y.toFixed(1)}`);}return pts.join('');}

function MiniSolarChart({lat,lng,doy,sunRes,seas}){
  const paths=useMemo(()=>({sum:buildArcPath(lat,lng,seas.sum),win:buildArcPath(lat,lng,seas.win),eq:buildArcPath(lat,lng,seas.eqMar),tod:buildArcPath(lat,lng,doy)}),[lat,lng,doy,seas]);
  const dot=sunRes?.day?sun2svg(sunRes.alt,sunRes.az):null;
  return h('div',{className:'bg-[#080c12] border border-slate-800 rounded-lg overflow-hidden'},
    h('div',{className:'flex items-center justify-between px-3 py-1.5 border-b border-slate-800'},h('span',{className:'text-[10px] uppercase tracking-widest text-slate-600'},'Carta Solar'),sunRes&&h('span',{className:'text-[10px] text-slate-500 tabular-nums'},sunRes.day?`az ${sunRes.az.toFixed(0)}° · alt ${sunRes.alt.toFixed(1)}°`:'noite')),
    h('svg',{viewBox:'0 0 200 200',className:'w-full h-auto',style:{maxHeight:'196px'}},
      h('rect',{width:200,height:200,fill:'#080c12'}),
      ...[{r:SR,s:'#1e3a5f',w:1.2},{r:SR*Math.cos(30*D2R),s:'#162032',w:.7},{r:SR*Math.cos(60*D2R),s:'#162032',w:.7}].map(({r,s,w},i)=>h('circle',{key:i,cx:SCX,cy:SCY,r:r.toFixed(1),stroke:s,strokeWidth:w,fill:'none'})),
      h('text',{x:SCX+2,y:SCY-SR*Math.cos(30*D2R)+8,fill:'#1e3a5f',fontSize:6,fontFamily:'Hind'},'30°'),h('text',{x:SCX+2,y:SCY-SR*Math.cos(60*D2R)+8,fill:'#1e3a5f',fontSize:6,fontFamily:'Hind'},'60°'),
      ...[...Array(12)].map((_,i)=>{const ar=i*30*D2R,c=i%3===0;return h('line',{key:i,x1:SCX,y1:SCY,x2:(SCX+SR*Math.sin(ar)).toFixed(1),y2:(SCY-SR*Math.cos(ar)).toFixed(1),stroke:c?'#1e3a5f':'#0f172a',strokeWidth:c?.7:.35});}),
      ...[{t:'N',x:SCX,y:9},{t:'S',x:SCX,y:197},{t:'L',x:194,y:SCY+3},{t:'O',x:6,y:SCY+3}].map(({t,x,y})=>h('text',{key:t,x,y,textAnchor:'middle',fill:'#334155',fontSize:8,fontFamily:'Hind',fontWeight:'600'},t)),
      paths.sum&&h('path',{d:paths.sum,stroke:'#F59E0B',strokeWidth:1.8,fill:'none',opacity:.8}),paths.win&&h('path',{d:paths.win,stroke:'#38BDF8',strokeWidth:1.8,fill:'none',opacity:.75}),
      paths.eq&&h('path',{d:paths.eq,stroke:'#34D399',strokeWidth:1.8,fill:'none',opacity:.75}),paths.tod&&h('path',{d:paths.tod,stroke:'#ffffff',strokeWidth:2,fill:'none',opacity:.95}),
      dot&&h('g',null,h('line',{x1:SCX,y1:SCY,x2:dot[0].toFixed(1),y2:dot[1].toFixed(1),stroke:'#F59E0B',strokeWidth:.5,opacity:.3,strokeDasharray:'2,2'}),h('circle',{cx:dot[0].toFixed(1),cy:dot[1].toFixed(1),r:8,fill:'#F59E0B',opacity:.12}),h('circle',{cx:dot[0].toFixed(1),cy:dot[1].toFixed(1),r:4.5,fill:'#F59E0B',stroke:'#fff',strokeWidth:1.2})),
      h('circle',{cx:SCX,cy:SCY,r:2,fill:'#1e293b'})
    ),
    h('div',{className:'flex flex-wrap gap-x-3 gap-y-1 px-3 py-2 border-t border-slate-800'},...[{c:'#F59E0B',l:'Verão'},{c:'#38BDF8',l:'Inverno'},{c:'#34D399',l:'Equinócio'},{c:'#ffffff',l:'Hoje'}].map(({c,l})=>h('span',{key:l,className:'flex items-center gap-1'},h('div',{className:'w-4 h-[2px] rounded',style:{background:c}}),h('span',{className:'text-[9px] text-slate-500'},l))))
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════════
const fmtH=h=>`${String(Math.floor(h)).padStart(2,'0')}:${String(Math.round((h-Math.floor(h))*60)).padStart(2,'0')}`;
const fmtD=d=>new Date(new Date().getFullYear(),0,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
const seasons=lat=>{const S=lat<0;return{sum:S?355:172,win:S?172:355,eqMar:79,eqSep:266,sumLbl:S?'Verão (Dez)':'Verão (Jun)',winLbl:S?'Inverno (Jun)':'Inverno (Dez)'};};
const _n=new Date(),_doy=Math.floor((_n-new Date(_n.getFullYear(),0,0))/86400000);
const INIT={lat:-23.5558,lng:-46.6396,hr:Math.round((_n.getHours()+_n.getMinutes()/60)*4)/4,doy:Math.max(1,Math.min(365,_doy)),radius:100};

function SolarApp(){
  const[lat,setLat]=useState(INIT.lat);const[lng,setLng]=useState(INIT.lng);
  const[hr,setHr]=useState(INIT.hr);const[doy,setDoy]=useState(INIT.doy);const[rad,setRad]=useState(INIT.radius);
  const[showChart,setShowChart]=useState(false);const[syncSt,setSyncSt]=useState('idle');
  const[selectMode,setSelectMode]=useState(false);const[glbBusy,setGlbBusy]=useState(false);
  const[center,setCenter]=useState(null);  // {lat,lng} do clique no mapa
  const seas=useMemo(()=>seasons(lat),[lat]);
  const sunNow=useMemo(()=>calcSun(lat,lng,doy,hr),[lat,lng,doy,hr]);
  const syncRef=useRef(null),dotRef=useRef(null),arcRef=useRef(null);

  // Buscar centro do mapa ao montar
  useEffect(()=>{(async()=>{try{const fc2=await rpc.invoke('getMapBounds',[]);const ring=fc2?.features?.[0]?.geometry?.coordinates?.[0];if(!ring)return;const lo=ring.map(c=>c[0]),la=ring.map(c=>c[1]);const cLng=((Math.min(...lo)+Math.max(...lo))/2);const cLat=((Math.min(...la)+Math.max(...la))/2);setLng(parseFloat(cLng.toFixed(6)));setLat(parseFloat(cLat.toFixed(6)));setCenter({lat:parseFloat(cLat.toFixed(6)),lng:parseFloat(cLng.toFixed(6))});}catch{}})();},[]);

  // Modo de seleção: escutar clique no mapa
  useEffect(()=>{
    if(!selectMode)return;
    console.log('[SunPath] ⌖ Modo de seleção ativado. Clique no mapa...');
    const handler=()=>{
      const raw=giraffeState.get('mapSelectCoord');
      console.log('[SunPath] mapSelectCoord raw:', JSON.stringify(raw));
      if(!raw)return;
      // Aceita múltiplos formatos: [lng,lat], {lng,lat}, {coordinates:[lng,lat]}, {geometry:{coordinates:[lng,lat]}}
      let cLat, cLng;
      if(Array.isArray(raw)){cLng=raw[0];cLat=raw[1];}
      else if(raw.lng!==undefined){cLng=raw.lng;cLat=raw.lat;}
      else if(raw.coordinates){cLng=raw.coordinates[0];cLat=raw.coordinates[1];}
      else if(raw.geometry?.coordinates){cLng=raw.geometry.coordinates[0];cLat=raw.geometry.coordinates[1];}
      else{console.warn('[SunPath] Formato de coordenada desconhecido:',raw);return;}
      console.log(`[SunPath] ✓ Centro selecionado: ${cLat.toFixed(6)}, ${cLng.toFixed(6)}`);
      setCenter({lat:cLat,lng:cLng});
      setSelectMode(false);
    };
    const unsub=giraffeState.addListener(['mapSelectCoord'],handler);
    return()=>{if(typeof unsub==='function')unsub();};
  },[selectMode]);

  // Sync sombras
  useEffect(()=>{if(syncRef.current)clearTimeout(syncRef.current);syncRef.current=setTimeout(async()=>{setSyncSt('syncing');const r=await syncGiraffeSun(sunNow.az,sunNow.alt);setSyncSt(r.ok?'ok':r.why);},120);return()=>clearTimeout(syncRef.current);},[sunNow]);

  // Origem efetiva: centro selecionado ou lat/lng do mapa
  const oLat=center?.lat??lat, oLng=center?.lng??lng;

  // Arco diário (quando mapa ligado)
  useEffect(()=>{if(!showChart){rmAll();return;}if(arcRef.current)clearTimeout(arcRef.current);arcRef.current=setTimeout(()=>plotDailyArc(oLat,oLng,doy,rad),350);return()=>clearTimeout(arcRef.current);},[oLat,oLng,doy,rad,showChart]);

  // Sol (quando mapa ligado)
  useEffect(()=>{if(!showChart)return;if(dotRef.current)clearTimeout(dotRef.current);dotRef.current=setTimeout(()=>plotSunDot(oLat,oLng,doy,hr,rad),80);return()=>clearTimeout(dotRef.current);},[oLat,oLng,doy,hr,rad,showChart]);

  useEffect(()=>()=>rmAll(),[]);

  // Gerar e baixar GLB
  const handleGLB=()=>{if(glbBusy)return;setGlbBusy(true);setTimeout(()=>{downloadSolarGLB(oLat,oLng,rad);setGlbBusy(false);},100);};

  const syncInfo={ok:{m:'✓ Sombras Sincronizadas',c:'text-emerald-400'},syncing:{m:'⟳ Calculando...',c:'text-amber-400'},night:{m:'☾ Noite',c:'text-slate-500'},no_views:{m:'⚠ Crie uma View',c:'text-red-400'},error:{m:'⚠ Erro',c:'text-red-400'},idle:{m:'',c:''}}[syncSt]||{m:'',c:''};
  const eqAc=doy===79||doy===266,eqSub=doy===266?'23 Set':'20 Mar';

  return h('div',{className:'h-screen flex flex-col p-3 gap-3 bg-[#0f1117]'},
    h('div',{className:'flex items-center justify-between border-b border-slate-800 pb-2.5'},
      h('div',null,h('h1',{className:'text-base font-semibold text-white'},'☀ LB Sun Path 3D [vG15]'),
        h('p',{className:'text-[10px] text-slate-600 mt-0.5'},center?`⌖ ${oLat.toFixed(4)}° · ${oLng.toFixed(4)}° (selecionado)`:`${lat.toFixed(4)}° · ${lng.toFixed(4)}° (mapa)`)),
      syncInfo.m&&h('span',{className:`text-[9px] px-2 py-1 bg-slate-900 rounded ${syncInfo.c}`},syncInfo.m)
    ),

    h('div',{className:'flex-1 overflow-y-auto kv-scroll flex flex-col gap-3'},
      h(MiniSolarChart,{lat:oLat,lng:oLng,doy,sunRes:sunNow,seas}),

      // Presets
      h('div',{className:'grid grid-cols-3 gap-2'},
        ...[{e:'☀',l:'Verão',ac:doy===seas.sum,bc:'amber',fn:()=>setDoy(seas.sum),sub:seas.sumLbl.split(' ')[1]},{e:'❄',l:'Inverno',ac:doy===seas.win,bc:'sky',fn:()=>setDoy(seas.win),sub:seas.winLbl.split(' ')[1]},{e:'◎',l:'Equinócio',ac:eqAc,bc:'emerald',fn:()=>setDoy(d=>d===79?266:79),sub:eqSub}].map(({e,l,ac,bc,fn,sub})=>{
          const C={amber:{b:'border-amber-500/25',t:'text-amber-400',bg:'bg-amber-500/10'},sky:{b:'border-sky-500/25',t:'text-sky-400',bg:'bg-sky-500/10'},emerald:{b:'border-emerald-500/25',t:'text-emerald-400',bg:'bg-emerald-500/10'}}[bc];
          return h('button',{key:l,onClick:fn,className:`flex flex-col items-center py-2 px-1 rounded border transition-all ${C.b} ${ac?C.bg:'bg-transparent hover:bg-white/[.02]'}`},h('span',{className:'text-sm leading-none'},e),h('span',{className:`text-[10px] font-semibold ${C.t}`},l),h('span',{className:'text-[9px] text-slate-600'},sub));
        })
      ),

      // Sliders
      h('div',{className:'bg-[#111827] rounded-lg border border-slate-800 p-3 flex flex-col gap-4'},
        ...[{l:'Horário',v:fmtH(hr),min:0,max:23.99,step:.25,val:hr,fn:v=>setHr(+v)},{l:'Data',v:fmtD(doy),min:1,max:365,step:1,val:doy,fn:v=>setDoy(+v)},{l:'Raio',v:rad+'m',min:50,max:500,step:10,val:rad,fn:v=>setRad(+v)}].map(({l,v,min,max,step,val,fn})=>h('div',{key:l},h('div',{className:'flex justify-between text-[11px] mb-2'},h('span',{className:'text-slate-400'},l),h('span',{className:'text-amber-400'},v)),h('input',{type:'range',className:'kv-slider',min,max,step,value:val,onChange:e=>fn(e.target.value)})))
      ),

      // Toggle Arco/Sol no mapa + Select Center
      h('div',{className:'p-3 bg-[#111827] rounded-lg border border-slate-800 flex flex-col gap-2.5'},
        h('div',{className:'flex items-center justify-between'},
          h('div',null,h('span',{className:'text-sm font-medium text-slate-300'},'Sol + Arco Diário no Mapa'),h('p',{className:'text-[10px] text-slate-600 mt-0.5'},showChart?'Ligado':'Desligado')),
          h('button',{className:`toggle ${showChart?'on':''}`,onClick:()=>setShowChart(v=>!v)})
        ),
        // Selecionar Centro
        h('button',{
          onClick:()=>setSelectMode(!selectMode),
          className:`w-full py-2 rounded text-[11px] font-bold uppercase tracking-wider transition-colors border ${
            selectMode?'border-red-500/50 bg-red-500/10 text-red-400 animate-pulse':'border-slate-700 bg-slate-800/50 text-slate-400 hover:border-slate-600'}`
        },selectMode?'⌖ Clique no Mapa para selecionar centro...':'⌖ Selecionar Centro no Mapa'),
      ),

      // Gerar GLB
      h('button',{
        onClick:handleGLB,disabled:glbBusy,
        className:`w-full py-2.5 rounded border border-amber-500/30 bg-amber-500/10 text-amber-500 text-[11px] font-bold uppercase tracking-wider hover:bg-amber-500/20 transition-colors ${glbBusy?'opacity-50 cursor-wait':''}`
      },glbBusy?'⟳ Gerando GLB...':'⇩ Baixar Carta Solar GLB (3D)'),
    )
  );
}

createRoot(document.getElementById('root')).render(h(SolarApp));
</script>
