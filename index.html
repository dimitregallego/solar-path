<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sun Path 3D · KV</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

    .kv-scroll::-webkit-scrollbar { width:3px; }
    .kv-scroll::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

    .kv-slider::-moz-range-thumb { width:14px; height:14px; border-radius:50%;

    .toggle.on { background:rgba(245,158,11,.2); border:1px solid #F59E0B; }
    .toggle::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px;

    .toggle.on::after { transform:translateX(16px); background:#F59E0B; }

<body class="bg-[#0f1117] text-slate-200">
<div id="root"></div>

<script type="module">
import { createElement as h, useState, useEffect, useRef, useMemo }
  from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import { giraffeState, rpc } from 'https://esm.sh/@gi-nx/iframe-sdk@latest';
import * as turf from 'https://esm.sh/@turf/turf@6.5.0';

// ══════════════════════════════════════════════════════════════════════
//  MOTOR SOLAR — NOAA / Meeus / Ladybug Tools
// ══════════════════════════════════════════════════════════════════════
const D2R = Math.PI/180, R2D = 180/Math.PI;

function julianDay(doy, hr, yr=2000) {
  const lp=(yr%4===0&&yr%100!==0)||yr%400===0;
  const ml=[0,31,lp?29:28,31,30,31,30,31,31,30,31,30,31];
  let m=1,r=doy; while(r>ml[m]&&m<12){r-=ml[m];m++;}
  let Y=yr,M=m; if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+r+B-1524.5+hr/24;
}

function calcSun(lat, lng, doy, hr) {
  const JD=julianDay(doy,hr), T=(JD-2451545)/36525;
  let L0=280.46646+T*(36000.76983+T*0.0003032); L0=((L0%360)+360)%360;
  let M=357.52911+T*(35999.05029-0.0001537*T);  M=((M%360)+360)%360;
  const Mr=M*D2R, e=0.016708634-T*(0.000042037+0.0000001267*T);
  const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const sl=L0+C, om=125.04-1934.136*T;
  const la=sl-0.00569-0.00478*Math.sin(om*D2R);
  const e0=23+(26+(21.448-T*(46.815+T*(0.00059-T*0.001813)))/60)/60;
  const ep=e0+0.00256*Math.cos(om*D2R), er=ep*D2R;
  const dec=Math.asin(Math.max(-1,Math.min(1,Math.sin(er)*Math.sin(la*D2R))))*R2D;
  const y=Math.pow(Math.tan(er/2),2), L0r=L0*D2R;
  const eot=4*R2D*(y*Math.sin(2*L0r)-2*e*Math.sin(Mr)+4*e*y*Math.sin(Mr)*Math.cos(2*L0r)
            -0.5*y*y*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));
  const tz=Math.round(lng/15);
  let tst=(hr*60+eot+4*lng-60*tz); tst=((tst%1440)+1440)%1440;
  const sn=(720-4*lng-eot+tz*60)/60, ha=(tst/4)-180;
  const har=ha*D2R, latr=lat*D2R, decr=dec*D2R;
  const cosZ=Math.sin(latr)*Math.sin(decr)+Math.cos(latr)*Math.cos(decr)*Math.cos(har);
  const zen=Math.acos(Math.max(-1,Math.min(1,cosZ)))*R2D, alt=90-zen;
  const sinZ=Math.sin(zen*D2R); let az;
  if(Math.abs(sinZ)<1e-10){ az=lat>=0?180:0; } else {
    const ca=(Math.sin(latr)*cosZ-Math.sin(decr))/(Math.cos(latr)*sinZ);
    const ar=Math.acos(Math.max(-1,Math.min(1,ca)));
    az=ha>0?(ar*R2D+180)%360:(540-ar*R2D)%360;
  }
  return { alt, az, sn, day: alt>-0.83 };
}

// ══════════════════════════════════════════════════════════════════════
//  SYNC DE SOMBRAS NATIVAS — activateViewLayers
//
//  Abordagem do usuário: { sun: { azimuth, altitude } } — mantida.
//  Diagnóstico único na 1ª chamada → console + window.__kvView
// ══════════════════════════════════════════════════════════════════════
let _dbgDone = false;
async function syncGiraffeSun(az, alt) {
  if(alt < -5) return { success:false, reason:'night' };
  const views = giraffeState.get('views')||[];
  if(!views.length) return { success:false, reason:'no_views' };
  const base = views[0];

  // Diagnóstico único: loga estrutura real da view
  if(!_dbgDone) {
    _dbgDone = true;
    window.__kvView = base;
    console.group('[KV SunPath] 🔍 Diagnóstico de sombras');
    console.log('View completa:', JSON.stringify(base, null, 2));
    console.log('Campos sun/light:', Object.keys(base).filter(k=>/sun|light|shadow|angle/i.test(k)));
    console.groupEnd();
  }

  // Tenta múltiplos formatos de campo — o Giraffe vai usar o que reconhecer
  try {
    await rpc.invoke('activateViewLayers', [{
      ...base,
      // Formato mais provável (simplificado do usuário)
      sun: { ...(base.sun||{}), azimuth: az, altitude: alt },
      // Alternativas documentadas e especulativas
      sunAzimuth: az, sunAltitude: alt,
      light: { anchor:'map', position:[1.5,(90-az+360)%360,Math.max(1,90-alt)],
               intensity: Math.min(.85,.12+Math.sin(alt*D2R)*.73),
               color: alt>15?'#fff':alt>0?'#ffd8aa':'#eecbaa' },
    }]);
    return { success:true };
  } catch(e) {
    console.error('[KV] syncSombras falhou:', e?.message);
    return { success:false, reason:'error' };
  }
}

// ══════════════════════════════════════════════════════════════════════
//  HELPERS DE GEOMETRIA
// ══════════════════════════════════════════════════════════════════════
function local2geo(x, y, oLng, oLat) {
  return [oLng+x/(111320*Math.cos(oLat*D2R)), oLat+y/111320];
}

const seasons = lat => {
  const S=lat<0;
  return { sum:S?355:172, win:S?172:355, eqMar:79, eqSep:266,
    sumLbl:S?'Verão (Dez)':'Verão (Jun)', winLbl:S?'Inverno (Jun)':'Inverno (Dez)' };
};

const rm = async id => { try{ await rpc.invoke('removeTempLayer',[id]); }catch{} };

// IDs das layers temp
const L = {
  DOME_GROUND: 'sp-dome-g',  // anéis de altitude no chão (plano)
  DOME_3D:     'sp-dome-3d', // anéis de altitude flutuando (3D)
  AZLINES:     'sp-azlines', // linhas de azimute radiais
  LABELS:      'sp-labels',  // rótulos N/S/L/O + graus
  SUM:  'sp-sum',  WIN: 'sp-win',  EQX: 'sp-eqx',  TOD: 'sp-tod',
  DOT:  'sp-dot',  POLE:'sp-pole',
};
const rmAll = () => Promise.allSettled(Object.values(L).map(rm));

// ══════════════════════════════════════════════════════════════════════
//  CARTA SOLAR NO MAPA — COMPASSO + ARCOS COMO LINHAS
//
//  CORREÇÃO CENTRAL vs. versão do usuário:
//  Antes: turf.buffer() nos segmentos → fill-extrusion → geometria sólida
//  Agora: LineString com Z-coordinates → type:"line" + line-elevation:0
//         = linhas finas idênticas ao diagrama Ladybug
// ══════════════════════════════════════════════════════════════════════

/**
 * Plota o compasso no chão:
 *  - Anéis de altitude planos (Z=0), um por ângulo de 10° em 10°
 *  - Linhas radiais de azimute a cada 10°
 *  - Rótulos cardeais + graus (symbol layer do usuário, mantido)
 */
async function plotCompassGround(lat, lng, radius) {
  await rm(L.DOME_GROUND); await rm(L.AZLINES); await rm(L.LABELS);

  const center = [lng, lat];
  const gFeatures = [], aFeatures = [], labels = [];

  // Anéis de altitude projetados no plano (stereografia)
  // Anel de altitude α° tem raio no chão = R·cos(α°)
  for(const alt of [0,10,20,30,40,50,60,70,80]) {
    const rr = radius * Math.cos(alt*D2R);
    if(rr < 1) continue;
    // turf.circle → polygon → polygonToLine = LineString preciso
    const circle = turf.circle(center, rr/1000, {steps:72, units:'kilometers'});
    const line   = turf.polygonToLine(circle);
    // Linha de horizonte mais grossa
    line.properties = { alt, horizon: alt===0 };
    gFeatures.push(line);
  }

  // Linhas radiais de azimute
  for(let az=0; az<360; az+=10) {
    const far = turf.destination(turf.point(center), radius/1000, az, {units:'kilometers'});
    const inner = turf.destination(turf.point(center), (radius*0.04)/1000, az, {units:'kilometers'});
    const ln = turf.lineString([inner.geometry.coordinates, far.geometry.coordinates]);
    ln.properties = { az, cardinal: az%90===0 };
    aFeatures.push(ln);
  }

  // Rótulos cardeais + ângulos
  for(let az=0; az<360; az+=30) {
    let lbl = az+'°';
    if(az===0)   lbl='N'; else if(az===90)  lbl='L';
    else if(az===180) lbl='S'; else if(az===270) lbl='O';
    const pt = turf.destination(turf.point(center),(radius+radius*0.12)/1000,az,{units:'kilometers'});
    pt.properties = { label:lbl };
    labels.push(pt);
  }

  // Camada de anéis (type:line — não fill-extrusion)
  await rpc.invoke('addTempLayerGeoJSON', [
    L.DOME_GROUND, {type:'FeatureCollection', features:gFeatures},
    { type:'line',
      paint:{
        'line-color': '#ffffff',
        'line-width': ['case',['get','horizon'],1.5,0.6],
        'line-opacity':['case',['get','horizon'],0.35,0.18],
      },
      layout:{'line-cap':'round'},
    },
  ]);

  // Camada de radiais (type:line)
  await rpc.invoke('addTempLayerGeoJSON', [
    L.AZLINES, {type:'FeatureCollection', features:aFeatures},
    { type:'line',
      paint:{
        'line-color':'#ffffff',
        'line-width':['case',['get','cardinal'],0.8,0.4],
        'line-opacity':['case',['get','cardinal'],0.3,0.12],
      },
    },
  ]);

  // Rótulos (symbol — do arquivo do usuário, mantido)
  await rpc.invoke('addTempLayerGeoJSON', [
    L.LABELS, {type:'FeatureCollection', features:labels},
    { type:'symbol',
      layout:{
        'text-field':['get','label'],
        'text-size':11,
        'text-font':['Open Sans Bold','Arial Unicode MS Bold'],
        'text-pitch-alignment':'map',
        'text-rotation-alignment':'map',
      },
      paint:{
        'text-color':'#94a3b8',
        'text-halo-color':'#0f1117',
        'text-halo-width':1.5,
      },
    },
  ]);
}

/**
 * Plota os anéis de altitude flutuando em 3D no céu — a "gaiola" Ladybug.
 * Cada anel é um círculo horizontal na altitude correta:
 *   raio_horizontal = R·cos(alt), elevação Z = R·sin(alt)
 *
 * Usa line-elevation:0 para que o Z da coordenada determine a elevação.
 * (Mapbox GL v2.6+; se não suportado, anéis aparecem no chão mas não
 *  conflitam com os anéis do DOME_GROUND pois têm raios diferentes.)
 */
async function plotDome3D(lat, lng, radius) {
  await rm(L.DOME_3D);
  const features = [];

  for(const alt of [10,20,30,40,50,60,70,80]) {
    const rh = radius * Math.cos(alt*D2R);   // raio horizontal
    const z  = radius * Math.sin(alt*D2R);   // elevação em metros
    if(rh < 1) continue;

    const coords = [];
    for(let i=0; i<=72; i++) {
      const t=(i/72)*2*Math.PI;
      const [pLng,pLat] = local2geo(rh*Math.sin(t), rh*Math.cos(t), lng, lat);
      coords.push([pLng, pLat, z]);  // coordenada 3D com Z = altitude do anel
    }
    features.push({
      type:'Feature',
      geometry:{type:'LineString', coordinates:coords},
      properties:{ alt },
    });
  }

  await rpc.invoke('addTempLayerGeoJSON', [
    L.DOME_3D, {type:'FeatureCollection', features},
    { type:'line',
      paint:{
        'line-color':'#ffffff',
        'line-width':0.5,
        'line-opacity':0.12,
        'line-elevation':0,   // ← habilita Z-coordinate elevation (Mapbox v2.6+)
      },
      layout:{'line-cap':'round'},
    },
  ]);
}

/**
 * Gera o arco de trajetória solar de um dia como GeoJSON LineString 3D.
 * Cada ponto do arco tem coordenada [lng, lat, Z_metros] onde:
 *   X = R·cos(alt)·sin(az)   → Leste
 *   Y = R·cos(alt)·cos(az)   → Norte
 *   Z = R·sin(alt)            → Cima
 *
 * Converte XY → geográfico via fromProjected (RPC) em paralelo.
 * Fallback local automático se o RPC falhar.
 */
async function genArc3D(lat, lng, doy, radius) {
  const pts = [];
  for(let hr=0; hr<=24; hr+=0.25) {
    const s = calcSun(lat,lng,doy,hr);
    if(!s.day || s.alt < -0.5) continue;
    const a=s.alt*D2R, z=s.az*D2R;
    pts.push({
      x: radius*Math.cos(a)*Math.sin(z),
      y: radius*Math.cos(a)*Math.cos(z),
      z: Math.max(0, radius*Math.sin(a)),
    });
  }
  if(pts.length < 2) return null;

  let geo;
  try { geo = await Promise.all(pts.map(p=>rpc.invoke('fromProjected',[[p.x,p.y],[lng,lat]]))); }
  catch { geo = pts.map(p=>local2geo(p.x,p.y,lng,lat)); }

  return {
    type:'Feature',
    geometry:{ type:'LineString',
      coordinates: geo.map(([ln,la],i)=>[ln,la,pts[i].z]) },   // ← 3D coords
    properties:{ _baseHeight:0, _height:Math.max(...pts.map(p=>p.z)) },
  };
}

/**
 * Plota um arco como type:"line" com Z-coordinates.
 * line-elevation:0 ativa a elevação por Z no Mapbox v2.6+.
 * Se não suportado, o arco aparece plano mas continua sendo uma linha fina
 * (não mais um sólido fill-extrusion como na versão anterior do usuário).
 */
async function plotArcLine(id, feat, color, width=2, opacity=0.8) {
  await rm(id);
  if(!feat) return;
  await rpc.invoke('addTempLayerGeoJSON', [
    id, {type:'FeatureCollection', features:[feat]},
    { type:'line',
      paint:{
        'line-color': color,
        'line-width': width,
        'line-opacity': opacity,
        'line-elevation': 0,   // ← correção principal: linhas finas em 3D
      },
      layout:{'line-cap':'round','line-join':'round'},
    },
  ]);
}

/**
 * Ponto do sol (círculo) + mastro vertical (linha).
 * Ambos usam type:"line" e type:"circle" — nenhum fill-extrusion.
 * circle-pitch-alignment:'map' mantém o círculo fixo ao plano 3D do mapa.
 */
async function plotSunDot(lat, lng, doy, hr, radius) {
  await rm(L.DOT); await rm(L.POLE);
  const s = calcSun(lat,lng,doy,hr); if(!s.day) return;

  const a=s.alt*D2R, z=s.az*D2R;
  const x=radius*Math.cos(a)*Math.sin(z), y=radius*Math.cos(a)*Math.cos(z);
  const elev=Math.max(0,radius*Math.sin(a));

  let sLng,sLat;
  try{ [sLng,sLat]=await rpc.invoke('fromProjected',[[x,y],[lng,lat]]); }
  catch{ [sLng,sLat]=local2geo(x,y,lng,lat); }

  const col = s.alt>20?'#F59E0B':s.alt>5?'#D97706':'#B45309';

  // Mastro vertical: LineString de Z=0 até Z=elev
  await rpc.invoke('addTempLayerGeoJSON', [
    L.POLE, {type:'FeatureCollection', features:[{type:'Feature',
      geometry:{type:'LineString', coordinates:[[sLng,sLat,0],[sLng,sLat,elev]]},
      properties:{_baseHeight:0,_height:elev} }]},
    { type:'line',
      paint:{'line-color':col,'line-width':1.5,'line-opacity':0.5,
             'line-dasharray':[4,3],'line-elevation':0} },
  ]);

  // Círculo solar: circle-pitch-alignment:'map'
  await rpc.invoke('addTempLayerGeoJSON', [
    L.DOT, {type:'FeatureCollection', features:[{type:'Feature',
      geometry:{type:'Point', coordinates:[sLng,sLat,elev]},
      properties:{_baseHeight:elev,_height:elev+3} }]},
    { type:'circle', paint:{
      'circle-color':col, 'circle-radius':12, 'circle-opacity':1,
      'circle-pitch-alignment':'map',
      'circle-stroke-width':2.5,'circle-stroke-color':'#ffffff','circle-stroke-opacity':.9,
    }},
  ]);
}

// ══════════════════════════════════════════════════════════════════════
//  CARTA SOLAR SVG — INLINE NO PAINEL (sempre visível, sem RPC)
//  Visual idêntico ao diagrama Ladybug com:
//   - Anéis concêntricos de altitude (0°/30°/60°)
//   - Linhas radiais de azimute (N/S/L/O)
//   - Trajetórias dos solstícios/equinócio/hoje
//   - Ponto solar animado
// ══════════════════════════════════════════════════════════════════════
const SVG_R=85, SVG_CX=100, SVG_CY=100;

const sun2svg = (alt,az) => {
  const r=SVG_R*Math.cos(alt*D2R);
  return [SVG_CX+r*Math.sin(az*D2R), SVG_CY-r*Math.cos(az*D2R)];
};

function buildSvgArcPath(lat, lng, doy) {
  const pts=[];
  for(let h=0;h<=24;h+=0.2){
    const s=calcSun(lat,lng,doy,h);
    if(!s.day||s.alt<0) continue;
    const [x,y]=sun2svg(s.alt,s.az);
    pts.push(pts.length===0?`M${x.toFixed(1)},${y.toFixed(1)}`:`L${x.toFixed(1)},${y.toFixed(1)}`);
  }
  return pts.join('');
}

function MiniSolarChart({ lat, lng, doy, hr, sunRes, seas }) {
  const paths = useMemo(()=>({
    sum: buildSvgArcPath(lat,lng,seas.sum),
    win: buildSvgArcPath(lat,lng,seas.win),
    eq:  buildSvgArcPath(lat,lng,seas.eqMar),
    tod: buildSvgArcPath(lat,lng,doy),
  }),[lat,lng,doy,seas]);

  const dotPos = sunRes?.day ? sun2svg(sunRes.alt,sunRes.az) : null;

  // Anéis de altitude e ângulos
  const rings=[{alt:0,r:SVG_R,s:'#334155',w:1.2},{alt:30,r:SVG_R*Math.cos(30*D2R),s:'#1e293b',w:.7},{alt:60,r:SVG_R*Math.cos(60*D2R),s:'#1e293b',w:.7}];

  return h('div',{className:'bg-[#080c12] border border-[#1e293b] rounded-lg overflow-hidden'},
    h('div',{className:'flex items-center justify-between px-3 py-1.5 border-b border-[#1e293b]'},
      h('span',{className:'text-[10px] uppercase tracking-widest text-slate-600'},'Carta Solar'),
      sunRes&&h('span',{className:'text-[10px] text-slate-500 tabular-nums'},
        sunRes.day?`${sunRes.az.toFixed(0)}° az · ${sunRes.alt.toFixed(1)}° alt`:'noite'),
    ),
    h('svg',{viewBox:'0 0 200 200',className:'w-full h-auto',style:{maxHeight:'196px'}},
      h('rect',{width:200,height:200,fill:'#080c12'}),
      // Anéis
      ...rings.map(({r,s,w},i)=>h('circle',{key:i,cx:SVG_CX,cy:SVG_CY,r:r.toFixed(1),stroke:s,strokeWidth:w,fill:'none'})),
      // Rótulos de altitude
      h('text',{x:SVG_CX+2,y:SVG_CY-SVG_R*Math.cos(30*D2R)+8,fill:'#1e293b',fontSize:6,fontFamily:'Hind'},'30°'),
      h('text',{x:SVG_CX+2,y:SVG_CY-SVG_R*Math.cos(60*D2R)+8,fill:'#1e293b',fontSize:6,fontFamily:'Hind'},'60°'),
      // Radiais de azimute a cada 30°
      ...[...Array(12)].map((_,i)=>{
        const ar=i*30*D2R,card=i%3===0;
        return h('line',{key:i,x1:SVG_CX,y1:SVG_CY,
          x2:(SVG_CX+SVG_R*Math.sin(ar)).toFixed(1),
          y2:(SVG_CY-SVG_R*Math.cos(ar)).toFixed(1),
          stroke:card?'#1e3a5f':'#0f172a',
          strokeWidth:card?.7:.35});
      }),
      // Rótulos cardeais
      ...[{t:'N',x:SVG_CX,y:9},{t:'S',x:SVG_CX,y:197},{t:'L',x:194,y:SVG_CY+3},{t:'O',x:6,y:SVG_CY+3}]
        .map(({t,x,y})=>h('text',{key:t,x,y,textAnchor:'middle',fill:'#334155',fontSize:8,fontFamily:'Hind',fontWeight:'600'},t)),
      // Trajetórias (linhas finas — Ladybug style)
      paths.sum&&h('path',{d:paths.sum,stroke:'#F59E0B',strokeWidth:1.8,fill:'none',opacity:.8}),
      paths.win&&h('path',{d:paths.win,stroke:'#38BDF8',strokeWidth:1.8,fill:'none',opacity:.75}),
      paths.eq &&h('path',{d:paths.eq, stroke:'#34D399',strokeWidth:1.8,fill:'none',opacity:.75}),
      paths.tod&&h('path',{d:paths.tod,stroke:'#ffffff',strokeWidth:2,  fill:'none',opacity:.95}),
      // Ponto solar atual
      dotPos&&h('g',null,
        h('line',{x1:SVG_CX,y1:SVG_CY,x2:dotPos[0].toFixed(1),y2:dotPos[1].toFixed(1),
          stroke:'#F59E0B',strokeWidth:.6,opacity:.3,strokeDasharray:'2,2'}),
        h('circle',{cx:dotPos[0].toFixed(1),cy:dotPos[1].toFixed(1),r:8,fill:'#F59E0B',opacity:.15}),
        h('circle',{cx:dotPos[0].toFixed(1),cy:dotPos[1].toFixed(1),r:4.5,fill:'#F59E0B',stroke:'#fff',strokeWidth:1.2}),
      ),
      h('circle',{cx:SVG_CX,cy:SVG_CY,r:2,fill:'#1e293b'}),
    ),
    // Legenda
    h('div',{className:'flex flex-wrap items-center gap-x-3 gap-y-1 px-3 py-2 border-t border-[#1e293b]'},
      ...[{c:'#F59E0B',l:seas.sumLbl},{c:'#38BDF8',l:seas.winLbl},
          {c:'#34D399',l:'Equinócio'},{c:'#ffffff',l:'Hoje'}]
        .map(({c,l})=>h('span',{key:l,className:'flex items-center gap-1'},
          h('div',{className:'w-4 h-[2px] rounded',style:{background:c}}),
          h('span',{className:'text-[9px] text-slate-600'},l),
        )),
    ),
  );
}

// ══════════════════════════════════════════════════════════════════════
//  ESTADO E UTILITÁRIOS
// ══════════════════════════════════════════════════════════════════════
const fmtH = h => `${String(Math.floor(h)).padStart(2,'0')}:${String(Math.round((h-Math.floor(h))*60)).padStart(2,'0')}`;
const fmtD = d => new Date(new Date().getFullYear(),0,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});

const _n=new Date(), _doy=Math.floor((_n-new Date(_n.getFullYear(),0,0))/86400000);
const INIT={ lat:-23.55,lng:-46.63,hr:Math.round((_n.getHours()+_n.getMinutes()/60)*4)/4,
  doy:Math.max(1,Math.min(365,_doy)),radius:200 };

// ══════════════════════════════════════════════════════════════════════
//  APP PRINCIPAL
// ══════════════════════════════════════════════════════════════════════
function SolarApp() {
  const [lat,setLat]=useState(INIT.lat);
  const [lng,setLng]=useState(INIT.lng);
  const [hr, setHr] =useState(INIT.hr);
  const [doy,setDoy]=useState(INIT.doy);
  const [rad,setRad]=useState(INIT.radius);
  const [showChart,setShowChart]=useState(false);  // padrão OFF
  const [syncSt,setSyncSt]=useState('idle');

  const seas = useMemo(()=>seasons(lat),[lat]);
  const sunNow = useMemo(()=>calcSun(lat,lng,doy,hr),[lat,lng,doy,hr]);

  const syncRef=useRef(null), dotRef=useRef(null), chartRef=useRef(null);
  const fixGen=useRef(0), todGen=useRef(0);

  // ── Ef.1: centro do mapa ───────────────────────────────────────────
  useEffect(()=>{
    async function go(){
      try{
        const fc=await rpc.invoke('getMapBounds',[]);
        const ring=fc?.features?.[0]?.geometry?.coordinates?.[0]; if(!ring) return;
        const lo=ring.map(c=>c[0]),la=ring.map(c=>c[1]);
        setLng(parseFloat(((Math.min(...lo)+Math.max(...lo))/2).toFixed(6)));
        setLat(parseFloat(((Math.min(...la)+Math.max(...la))/2).toFixed(6)));
      }catch{}
    }
    go();
    const u=giraffeState.addListener(['mapBounds'],go);
    return ()=>{ if(typeof u==='function') u(); };
  },[]);

  // ── Ef.2: sync de sombras + bolinha (debounce 100ms) ───────────────
  useEffect(()=>{
    if(syncRef.current) clearTimeout(syncRef.current);
    syncRef.current=setTimeout(async()=>{
      setSyncSt('syncing');
      const r=await syncGiraffeSun(sunNow.az,sunNow.alt);
      setSyncSt(r.success?'ok':r.reason);
    },100);

    if(showChart){
      if(dotRef.current) clearTimeout(dotRef.current);
      dotRef.current=setTimeout(()=>plotSunDot(lat,lng,doy,hr,rad),80);
    }
    return ()=>{ clearTimeout(syncRef.current); clearTimeout(dotRef.current); };
  },[lat,lng,hr,doy,rad,showChart,sunNow]);

  // ── Ef.3: desligar mapa ────────────────────────────────────────────
  useEffect(()=>{ if(!showChart) rmAll(); },[showChart]);

  // ── Ef.4: compasso + anéis 3D (lat/lng/rad) ───────────────────────
  useEffect(()=>{
    if(!showChart) return;
    plotCompassGround(lat,lng,rad);
    plotDome3D(lat,lng,rad);
  },[lat,lng,rad,showChart]);

  // ── Ef.5: arcos fixos — solstícios + equinócio (debounce 350ms) ───
  useEffect(()=>{
    if(!showChart) return;
    const gen=++fixGen.current;
    const t=setTimeout(async()=>{
      if(gen!==fixGen.current) return;
      const [sumF,winF,eqF]=await Promise.all([
        genArc3D(lat,lng,seas.sum,rad),
        genArc3D(lat,lng,seas.win,rad),
        genArc3D(lat,lng,seas.eqMar,rad),
      ]);
      if(gen!==fixGen.current) return;
      await plotArcLine(L.SUM,sumF,'#F59E0B',2,.75);
      await plotArcLine(L.WIN,winF,'#38BDF8',2,.70);
      await plotArcLine(L.EQX,eqF, '#34D399',2,.70);
    },350);
    return ()=>{ clearTimeout(t); fixGen.current=gen+1; };
  },[lat,lng,rad,seas,showChart]);

  // ── Ef.6: arco do dia atual (debounce 350ms) ──────────────────────
  useEffect(()=>{
    if(!showChart) return;
    const gen=++todGen.current;
    const t=setTimeout(async()=>{
      if(gen!==todGen.current) return;
      const f=await genArc3D(lat,lng,doy,rad);
      if(gen!==todGen.current) return;
      await plotArcLine(L.TOD,f,'#ffffff',2.5,.9);
    },350);
    return ()=>{ clearTimeout(t); todGen.current=gen+1; };
  },[lat,lng,doy,rad,showChart]);

  // ── Ef.7: cleanup ─────────────────────────────────────────────────
  useEffect(()=>()=>rmAll(),[]);

  // ── Handlers ──────────────────────────────────────────────────────
  const setPreset = d => setDoy(d);
  const toggleEq  = () => setDoy(d=>d===79?266:79);

  const syncInfo = {
    ok:       { msg:'✓ Sombras Sincronizadas', cls:'text-emerald-400' },
    syncing:  { msg:'⟳ Calculando...', cls:'text-amber-400' },
    night:    { msg:'☾ Sol abaixo do horizonte', cls:'text-slate-500' },
    no_views: { msg:'⚠ Crie uma View para sombras', cls:'text-red-400' },
    error:    { msg:'⚠ Erro no sync — ver console', cls:'text-red-400' },
    idle:     { msg:'', cls:'' },
  }[syncSt]||{msg:'',cls:''};

  return h('div',{className:'h-screen flex flex-col p-3 gap-3 bg-[#0f1117]'},

    // Header
    h('div',{className:'flex items-center justify-between border-b border-slate-800 pb-2.5'},
      h('div',null,
        h('h1',{className:'text-base font-semibold text-white tracking-wide'},'☀ Sun Path 3D · KV'),
        h('p',{className:'text-[10px] text-slate-600 mt-0.5'},`${lat.toFixed(4)}° · ${lng.toFixed(4)}°`),
      ),
      syncInfo.msg&&h('span',{className:`text-[9px] px-2 py-1 bg-slate-900 rounded ${syncInfo.cls}`},syncInfo.msg),
    ),

    h('div',{className:'flex-1 overflow-y-auto kv-scroll flex flex-col gap-3'},

      // Carta Solar SVG (sempre visível)
      h(MiniSolarChart,{lat,lng,doy,hr,sunRes:sunNow,seas}),

      // Presets
      h('div',{className:'grid grid-cols-3 gap-2'},
        ...[
          {e:'☀',l:'Verão',   d:seas.sum, ac:doy===seas.sum,   bc:'amber'},
          {e:'❄',l:'Inverno', d:seas.win, ac:doy===seas.win,   bc:'sky'},
          {e:'◎',l:'Equinócio',d:null, ac:doy===79||doy===266, bc:'emerald',
            sub:doy===266?'23 Set':'20 Mar', fn:toggleEq},
        ].map(({e,l,d,ac,bc,sub,fn})=>{
          const cols={amber:{b:'border-amber-500/25',t:'text-amber-400',bg:'bg-amber-500/10'},
                      sky:  {b:'border-sky-500/25',  t:'text-sky-400',  bg:'bg-sky-500/10'},
                      emerald:{b:'border-emerald-500/25',t:'text-emerald-400',bg:'bg-emerald-500/10'}};
          const c=cols[bc];
          return h('button',{key:l,
            onClick:()=>{ if(fn) fn(); else setPreset(d); },
            className:`flex flex-col items-center py-2 rounded border transition-all ${c.b} ${ac?c.bg:'bg-transparent hover:bg-white/[.02]'}`},
            h('span',{className:'text-sm leading-none'},e),
            h('span',{className:`text-[10px] font-semibold ${c.t}`},l),
            sub&&h('span',{className:'text-[9px] text-slate-600'},sub),
          );
        }),
      ),

      // Sliders
      h('div',{className:'bg-[#111827] rounded-lg border border-slate-800 p-3 flex flex-col gap-3.5'},
        ...[
          {l:'Horário', v:fmtH(hr),  min:0,  max:23.99,step:.25,val:hr,  fn:v=>setHr(+v)},
          {l:'Data',    v:fmtD(doy), min:1,  max:365,  step:1,  val:doy, fn:v=>setDoy(+v)},
          {l:'Raio',    v:rad+'m',   min:50, max:500,  step:10, val:rad, fn:v=>setRad(+v)},
        ].map(({l,v,min,max,step,val,fn})=>h('div',{key:l},
          h('div',{className:'flex justify-between text-[11px] font-medium mb-2'},
            h('span',{className:'text-slate-400'},l),
            h('span',{className:'text-amber-400'},v),
          ),
          h('input',{type:'range',className:'kv-slider',min,max,step,value:val,onChange:e=>fn(e.target.value)}),
        )),
      ),

      // Toggle mapa 3D
      h('div',{className:'flex items-center justify-between p-3 bg-[#111827] rounded-lg border border-slate-800 mt-auto'},
        h('div',null,
          h('span',{className:'text-sm font-medium text-slate-300'},'Carta Solar no Mapa 3D'),
          h('p',{className:'text-[10px] text-slate-600 mt-0.5'},showChart?'Ligado — layers visíveis no mapa':'Desligado (padrão)'),
        ),
        h('button',{className:`toggle ${showChart?'on':''}`,onClick:()=>setShowChart(v=>!v)}),
      ),

    ), // fim scroll
  );
}

createRoot(document.getElementById('root')).render(h(SolarApp));
</script>
</body>
</html>
