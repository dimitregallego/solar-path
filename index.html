<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sun Path 3D · KV [vG11]</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family:'Hind',system-ui,sans-serif; overflow:hidden; }
    .kv-scroll::-webkit-scrollbar { width:3px; }
    .kv-scroll::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
    .kv-slider { -webkit-appearance:none; appearance:none; width:100%; height:3px; background:#2d3748; border-radius:2px; cursor:pointer; outline:none; }
    .kv-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#F59E0B; border:2px solid #0f1117; cursor:pointer; transition:transform .1s, box-shadow .1s; }
    .kv-slider::-webkit-slider-thumb:active { transform:scale(1.35); box-shadow:0 0 0 5px rgba(245,158,11,.2); }
    .toggle { position:relative; width:36px; height:20px; background:#2d3748; border-radius:10px; cursor:pointer; border:none; padding:0; transition:background .2s; }
    .toggle.on { background:rgba(245,158,11,.15); border:1px solid #F59E0B; }
    .toggle::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#718096; transition:transform .2s, background .2s; }
    .toggle.on::after { transform:translateX(16px); background:#F59E0B; }
  </style>
</head>
<body class="bg-[#0f1117] text-slate-200">
<div id="root"></div>

<script type="module">
import { createElement as h, useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import { giraffeState, rpc } from 'https://esm.sh/@gi-nx/iframe-sdk@latest';
import * as turf from 'https://esm.sh/@turf/turf@6.5.0';

const D2R = Math.PI/180, R2D = 180/Math.PI;

const COLOR = {
  MONTHS: ['#fff7ad', '#ffe491', '#ffd175', '#ffbe59', '#ffaa3d', '#ff9621', '#ff8205', '#f26e00', '#e55a00', '#d84600', '#cc3200', '#bf1e00'],
  ANALEMMAS: '#40a0ff', SUN: ['#D97706', '#F59E0B']
};

const L = { PATHS:'sp-paths', COMPASS:'sp-compass', LABELS:'sp-labels', DOT:'sp-dot', POLE:'sp-pole' };

const seasons = lat => {
  const S = lat < 0;
  return { sum: S?355:172, win: S?172:355, eqMar: 79, eqSep: 266, sumLbl: S?'Verão (Dez)':'Verão (Jun)', winLbl: S?'Inverno (Jun)':'Inverno (Dez)' };
};

// ─── MATEMÁTICA SOLAR ────────────────────────────────────────────────────────
function julianDay(doy, hr, yr=2000) {
  const lp=(yr%4===0&&yr%100!==0)||yr%400===0;
  const ml=[0,31,lp?29:28,31,30,31,30,31,31,30,31,30,31];
  let m=1,r=doy; while(r>ml[m]&&m<12){r-=ml[m];m++;}
  let Y=yr,M=m; if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+r+B-1524.5+hr/24;
}

function calcSun(lat, lng, doy, hr) {
  const JD=julianDay(doy,hr), T=(JD-2451545)/36525;
  let L0=280.46646+T*(36000.76983+T*0.0003032); L0=((L0%360)+360)%360;
  let M=357.52911+T*(35999.05029-0.0001537*T);  M=((M%360)+360)%360;
  const Mr=M*D2R, e=0.016708634-T*(0.000042037+0.0000001267*T);
  const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const sl=L0+C, om=125.04-1934.136*T;
  const la=sl-0.00569-0.00478*Math.sin(om*D2R);
  const e0=23+(26+(21.448-T*(46.815+T*(0.00059-T*0.001813)))/60)/60;
  const ep=e0+0.00256*Math.cos(om*D2R), er=ep*D2R;
  const dec=Math.asin(Math.max(-1,Math.min(1,Math.sin(er)*Math.sin(la*D2R))))*R2D;
  const y=Math.pow(Math.tan(er/2),2), L0r=L0*D2R;
  const eot=4*R2D*(y*Math.sin(2*L0r)-2*e*Math.sin(Mr)+4*e*y*Math.sin(Mr)*Math.cos(2*L0r)-0.5*y*y*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));
  const tz=Math.round(lng/15);
  let tst=(hr*60+eot+4*lng-60*tz); tst=((tst%1440)+1440)%1440;
  const sn=(720-4*lng-eot+tz*60)/60, ha=(tst/4)-180;
  const har=ha*D2R, latr=lat*D2R, decr=dec*D2R;
  const cosZ=Math.sin(latr)*Math.sin(decr)+Math.cos(latr)*Math.cos(decr)*Math.cos(har);
  const zen=Math.acos(Math.max(-1,Math.min(1,cosZ)))*R2D, alt=90-zen;
  const sinZ=Math.sin(zen*D2R); let az;
  if(Math.abs(sinZ)<1e-10){ az=lat>=0?180:0; } else {
    const ca=(Math.sin(latr)*cosZ-Math.sin(decr))/(Math.cos(latr)*sinZ);
    const ar=Math.acos(Math.max(-1,Math.min(1,ca)));
    az=ha>0?(ar*R2D+180)%360:(540-ar*R2D)%360;
  }
  return { alt, az, sn, day: alt>-0.83 };
}

async function syncGiraffeSun(az, alt) {
  if(alt < -5) return { ok:false, why:'night' };
  const views = giraffeState.get('views') || [];
  if(!views.length) return { ok:false, why:'no_views' };
  let safeView;
  try { safeView = JSON.parse(JSON.stringify(views[0])); }
  catch { safeView = { id: views[0].id, name: views[0].name || '', layerTree: views[0].layerTree || [] }; }
  const patchedView = { ...safeView, sun: { ...(safeView.sun || {}), azimuth: az, altitude: alt }, sunAzimuth: az, sunAltitude: alt };
  try { await rpc.invoke('activateViewLayers', [patchedView]); return { ok:true }; }
  catch(e) { return { ok:false, why:'error' }; }
}

// ─── HELPERS E GERAÇÃO 3D ────────────────────────────────────────────────────
function local2geo(x, y, oLng, oLat) { return [ oLng + x / (111320 * Math.cos(oLat*D2R)), oLat + y / 111320 ]; }
const fc = (features) => ({ type:'FeatureCollection', features });
const rm = async id => { try{ await rpc.invoke('removeTempLayer',[id]); }catch{} };

function extrudeLine3D(coords3D, properties) {
  const segments = [];
  for (let i = 0; i < coords3D.length - 1; i++) {
    const p1 = coords3D[i], p2 = coords3D[i+1];
    if (p1[2] < -1 && p2[2] < -1) continue; 
    const line = turf.lineString([[p1[0], p1[1]], [p2[0], p2[1]]]);
    const poly = turf.buffer(line, 0.35, { units: 'meters' });
    if (poly) {
      poly.properties = { ...properties, _baseHeight: Math.max(0, Math.min(p1[2], p2[2])), _height: Math.max(0.1, Math.max(p1[2], p2[2]) + 0.35) };
      segments.push(poly);
    }
  }
  return segments;
}

function generateAnalyticMesh(lat, lng, radius, currentDoy) {
  const features = [];
  const seasonSteps = lat < 0 ? [355, 17, 46, 79, 107, 137, 172, 199, 229, 266, 292, 321] : [172, 199, 229, 266, 292, 321, 355, 17, 46, 79, 107, 137];
  
  for (let m = 0; m < 12; m++) {
    const doy = seasonSteps[m];
    const coords3D = [];
    for (let h = 0; h <= 24; h += 0.5) {
      const sun = calcSun(lat, lng, doy, h);
      if (!sun.day && sun.alt < -1) continue;
      const a = sun.alt*D2R, z = sun.az*D2R;
      const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
      coords3D.push([ln, la, Math.max(0, radius*Math.sin(a))]);
    }
    if (coords3D.length > 1) {
      const isCurrent = Math.abs(doy - currentDoy) < 15;
      features.push(...extrudeLine3D(coords3D, { color: COLOR.MONTHS[m % 12], _opacity: isCurrent ? 1.0 : 0.4 }));
    }
  }

  for (let h = 8; h <= 18; h += 1) {
    const coords3D = [];
    for (let doy = 1; doy <= 365; doy += 6) {
      const sun = calcSun(lat, lng, doy, h);
      if (!sun.day || sun.alt <= 0) continue;
      const a = sun.alt*D2R, z = sun.az*D2R;
      const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
      coords3D.push([ln, la, Math.max(0, radius*Math.sin(a))]);
    }
    if (coords3D.length > 2) {
      coords3D.push(coords3D[0]);
      features.push(...extrudeLine3D(coords3D, { color: COLOR.ANALEMMAS, _opacity: 0.35 }));
    }
  }
  return features;
}

async function plotAnalyticWireframes(lat, lng, radius, currentDoy) {
  await rm(L.PATHS);
  const features = generateAnalyticMesh(lat, lng, radius, currentDoy);
  await rpc.invoke("addTempLayerGeoJSON", [L.PATHS, fc(features), { type: "fill-extrusion", paint: { "fill-extrusion-color": ["get", "color"], "fill-extrusion-base": ["get", "_baseHeight"], "fill-extrusion-height": ["get", "_height"], "fill-extrusion-opacity": ["get", "_opacity"] } }]);
}

async function plotSunDotAndPole(lat, lng, doy, hr, radius) {
  await rm(L.DOT); await rm(L.POLE);
  const sun = calcSun(lat, lng, doy, hr); if(!sun.day) return;
  const a = sun.alt*D2R, z = sun.az*D2R;
  const coordZ = Math.max(0, radius*Math.sin(a));
  const [sLng, sLat] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
  const col = sun.alt>20 ? COLOR.SUN[1] : COLOR.SUN[0];
  
  const polePoly = turf.buffer(turf.lineString([[sLng, sLat], [sLng, sLat]]), 0.6, { units: 'meters' });
  polePoly.properties = { color: col, _baseHeight: 0, _height: coordZ, _opacity: 0.6 };
  await rpc.invoke("addTempLayerGeoJSON", [L.POLE, fc([polePoly]), { type: "fill-extrusion", paint: { "fill-extrusion-color": ["get", "color"], "fill-extrusion-base": ["get", "_baseHeight"], "fill-extrusion-height": ["get", "_height"], "fill-extrusion-opacity": ["get", "_opacity"] } }]);
  
  const dotPoly = turf.buffer(turf.point([sLng, sLat]), 4.0, { units: 'meters' });
  dotPoly.properties = { color: col, _baseHeight: coordZ, _height: coordZ + 4.0, _opacity: 1 };
  await rpc.invoke("addTempLayerGeoJSON", [L.DOT, fc([dotPoly]), { type:"fill-extrusion", paint: { "fill-extrusion-color": ["get", "color"], "fill-extrusion-base": ["get", "_baseHeight"], "fill-extrusion-height": ["get", "_height"], "fill-extrusion-opacity": ["get", "_opacity"] } }]);
}

async function plotCompassGround(lat, lng, radius) {
  await rm(L.COMPASS); await rm(L.LABELS);
  const features = [], labels = [];
  const center = [lng, lat];

  for (let r = radius * 0.33; r <= radius; r += radius * 0.33) {
    const ring = [];
    for (let angle = 0; angle <= 360; angle += 5) ring.push(turf.destination(turf.point(center), r/1000, angle, {units: 'kilometers'}).geometry.coordinates);
    features.push(turf.lineString(ring, { color: '#ffffff', width: 1, opacity: 0.2 }));
  }

  for (let angle = 0; angle < 360; angle += 15) {
    const far = turf.destination(turf.point(center), radius/1000, angle, {units: 'kilometers'}).geometry.coordinates;
    const isMain = angle % 90 === 0;
    features.push(turf.lineString([center, far], { color: '#ffffff', width: isMain ? 1.5 : 1, opacity: isMain ? 0.4 : 0.15 }));
    if (angle % 30 === 0) {
      let lbl = angle + '°';
      if(angle === 0) lbl = 'N'; else if(angle === 90) lbl = 'L'; else if(angle === 180) lbl = 'S'; else if(angle === 270) lbl = 'O';
      labels.push(turf.destination(turf.point(center), (radius+18)/1000, angle, {units: 'kilometers', properties: { label: lbl }}));
    }
  }

  await rpc.invoke("addTempLayerGeoJSON", [L.COMPASS, fc(features), { type: "line", paint: { "line-color": ["get", "color"], "line-width": ["get", "width"], "line-opacity": ["get", "opacity"] } }]);
  await rpc.invoke("addTempLayerGeoJSON", [L.LABELS, fc(labels), { type: "symbol", layout: { "text-field": ["get", "label"], "text-size": 12, "text-pitch-alignment": "map", "text-rotation-alignment": "map" }, paint: { "text-color": "#94a3b8", "text-halo-color": "#000000", "text-halo-width": 1.5 } }]);
}

// ─── CARTA SOLAR SVG ─────────────────────────────────────────────────────────
const SR=85, SCX=100, SCY=100;
const sun2svg = (alt,az) => { const r=SR*Math.cos(alt*D2R); return [SCX+r*Math.sin(az*D2R), SCY-r*Math.cos(az*D2R)]; };
function buildArcPath(lat,lng,doy) {
  const pts=[];
  for(let h=0;h<=24;h+=0.2){
    const s=calcSun(lat,lng,doy,h); if(!s.day||s.alt<0) continue;
    const [x,y]=sun2svg(s.alt,s.az); pts.push(pts.length===0?`M${x.toFixed(1)},${y.toFixed(1)}`:`L${x.toFixed(1)},${y.toFixed(1)}`);
  }
  return pts.join('');
}

function MiniSolarChart({ lat, lng, doy, sunRes, seas }) {
  const paths = useMemo(()=>({ sum: buildArcPath(lat,lng,seas.sum), win: buildArcPath(lat,lng,seas.win), eq: buildArcPath(lat,lng,seas.eqMar), tod: buildArcPath(lat,lng,doy) }),[lat,lng,doy,seas]);
  const dot = sunRes?.day ? sun2svg(sunRes.alt,sunRes.az) : null;
  return h('div',{className:'bg-[#080c12] border border-slate-800 rounded-lg overflow-hidden'},
    h('div',{className:'flex items-center justify-between px-3 py-1.5 border-b border-slate-800'}, h('span',{className:'text-[10px] uppercase tracking-widest text-slate-600'},'Carta Solar'), sunRes&&h('span',{className:'text-[10px] text-slate-500 tabular-nums'}, sunRes.day?`az ${sunRes.az.toFixed(0)}° · alt ${sunRes.alt.toFixed(1)}°`:'noite')),
    h('svg',{viewBox:'0 0 200 200',className:'w-full h-auto',style:{maxHeight:'196px'}},
      h('rect',{width:200,height:200,fill:'#080c12'}),
      ...[{r:SR,s:'#1e3a5f',w:1.2},{r:SR*Math.cos(30*D2R),s:'#162032',w:.7},{r:SR*Math.cos(60*D2R),s:'#162032',w:.7}].map(({r,s,w},i)=>h('circle',{key:i,cx:SCX,cy:SCY,r:r.toFixed(1),stroke:s,strokeWidth:w,fill:'none'})),
      h('text',{x:SCX+2,y:SCY-SR*Math.cos(30*D2R)+8,fill:'#1e3a5f',fontSize:6,fontFamily:'Hind'},'30°'), h('text',{x:SCX+2,y:SCY-SR*Math.cos(60*D2R)+8,fill:'#1e3a5f',fontSize:6,fontFamily:'Hind'},'60°'),
      ...[...Array(12)].map((_,i)=>{ const ar=i*30*D2R,card=i%3===0; return h('line',{key:i,x1:SCX,y1:SCY,x2:(SCX+SR*Math.sin(ar)).toFixed(1),y2:(SCY-SR*Math.cos(ar)).toFixed(1), stroke:card?'#1e3a5f':'#0f172a',strokeWidth:card?.7:.35}); }),
      ...[{t:'N',x:SCX,y:9},{t:'S',x:SCX,y:197},{t:'L',x:194,y:SCY+3},{t:'O',x:6,y:SCY+3}].map(({t,x,y})=>h('text',{key:t,x,y,textAnchor:'middle',fill:'#334155',fontSize:8,fontFamily:'Hind',fontWeight:'600'},t)),
      paths.sum&&h('path',{d:paths.sum,stroke:'#F59E0B',strokeWidth:1.8,fill:'none',opacity:.8}), paths.win&&h('path',{d:paths.win,stroke:'#38BDF8',strokeWidth:1.8,fill:'none',opacity:.75}),
      paths.eq &&h('path',{d:paths.eq, stroke:'#34D399',strokeWidth:1.8,fill:'none',opacity:.75}), paths.tod&&h('path',{d:paths.tod,stroke:'#ffffff',strokeWidth:2,  fill:'none',opacity:.95}),
      dot&&h('g',null, h('line',{x1:SCX,y1:SCY,x2:dot[0].toFixed(1),y2:dot[1].toFixed(1), stroke:'#F59E0B',strokeWidth:.5,opacity:.3,strokeDasharray:'2,2'}), h('circle',{cx:dot[0].toFixed(1),cy:dot[1].toFixed(1),r:8,fill:'#F59E0B',opacity:.12}), h('circle',{cx:dot[0].toFixed(1),cy:dot[1].toFixed(1),r:4.5,fill:'#F59E0B',stroke:'#fff',strokeWidth:1.2}) ),
      h('circle',{cx:SCX,cy:SCY,r:2,fill:'#1e293b'})
    ),
    h('div',{className:'flex flex-wrap gap-x-3 gap-y-1 px-3 py-2 border-t border-slate-800'}, ...[{c:'#F59E0B',l:seas.sumLbl},{c:'#38BDF8',l:seas.winLbl},{c:'#34D399',l:'Equinócio'},{c:'#ffffff',l:'Hoje'}].map(({c,l})=>h('span',{key:l,className:'flex items-center gap-1'}, h('div',{className:'w-4 h-[2px] rounded',style:{background:c}}), h('span',{className:'text-[9px] text-slate-500'},l))) )
  );
}

// ─── INTERFACE REACT ─────────────────────────────────────────────────────────
const fmtH = h => `${String(Math.floor(h)).padStart(2,'0')}:${String(Math.round((h-Math.floor(h))*60)).padStart(2,'0')}`;
const fmtD = d => new Date(new Date().getFullYear(),0,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
const _n=new Date(), _doy=Math.floor((_n-new Date(_n.getFullYear(),0,0))/86400000);
const INIT={lat:-23.55,lng:-46.63,hr:Math.round((_n.getHours()+_n.getMinutes()/60)*4)/4, doy:Math.max(1,Math.min(365,_doy)),radius:200};

function SolarApp() {
  const [lat,setLat]=useState(INIT.lat); const [lng,setLng]=useState(INIT.lng);
  const [hr, setHr ]=useState(INIT.hr); const [doy,setDoy]=useState(INIT.doy); const [rad,setRad]=useState(INIT.radius);
  const [showChart,setShowChart]=useState(false); const [syncSt,setSyncSt]=useState('idle');
  const [isBaking,setIsBaking]=useState(false); 
  
  const seas = useMemo(()=>seasons(lat),[lat]); const sunNow = useMemo(()=>calcSun(lat,lng,doy,hr),[lat,lng,doy,hr]);
  const syncRef=useRef(null), dotRef=useRef(null), fixGen=useRef(0);

  useEffect(()=>{
    (async()=>{
      try {
        const fc2=await rpc.invoke('getMapBounds',[]); const ring=fc2?.features?.[0]?.geometry?.coordinates?.[0]; if(!ring) return;
        const lo=ring.map(c=>c[0]),la=ring.map(c=>c[1]);
        setLng(parseFloat(((Math.min(...lo)+Math.max(...lo))/2).toFixed(6))); setLat(parseFloat(((Math.min(...la)+Math.max(...la))/2).toFixed(6)));
      }catch{}
    })();
  },[]);

  useEffect(()=>{
    if(syncRef.current) clearTimeout(syncRef.current);
    syncRef.current=setTimeout(async()=>{ setSyncSt('syncing'); const r=await syncGiraffeSun(sunNow.az,sunNow.alt); setSyncSt(r.ok?'ok':r.why); },120);
    return ()=>clearTimeout(syncRef.current);
  },[sunNow]);

  useEffect(()=>{
    if(!showChart) return; if(dotRef.current) clearTimeout(dotRef.current);
    dotRef.current=setTimeout(()=>plotSunDotAndPole(lat,lng,doy,hr,rad),80);
    return ()=>clearTimeout(dotRef.current);
  },[lat,lng,doy,hr,rad,showChart]);

  useEffect(()=>{ if(!showChart) { Object.values(L).forEach(rm); } },[showChart]);

  useEffect(()=>{
    if(!showChart) return; const gen=++fixGen.current;
    const t=setTimeout(async()=>{
      if(gen!==fixGen.current) return;
      await plotCompassGround(lat,lng,rad);
      await plotAnalyticWireframes(lat, lng, rad, doy);
    },300); return ()=>{ clearTimeout(t); fixGen.current=gen+1; };
  },[lat,lng,rad,doy,showChart]);

  useEffect(()=>()=>Object.values(L).forEach(rm),[]);

  const handleBake = async () => {
    if (isBaking) return;
    setIsBaking(true);
    try {
      const pathFeats = generateAnalyticMesh(lat, lng, rad, doy);
      const compassFeats = [];
      const center = [lng, lat];
      
      for (let r = rad * 0.33; r <= rad; r += rad * 0.33) {
        const ring = [];
        for (let angle = 0; angle <= 360; angle += 5) ring.push(turf.destination(turf.point(center), r/1000, angle, {units: 'kilometers'}).geometry.coordinates);
        const poly = turf.buffer(turf.lineString(ring), 0.8, {units: 'meters'});
        if(poly) { poly.properties = { color: '#ffffff', _opacity: 0.2, _baseHeight: 0, _height: 0.1, layer: "Sun Path Compass" }; compassFeats.push(poly); }
      }
      for (let angle = 0; angle < 360; angle += 15) {
        const far = turf.destination(turf.point(center), rad/1000, angle, {units: 'kilometers'}).geometry.coordinates;
        const isMain = angle % 90 === 0;
        const poly = turf.buffer(turf.lineString([center, far]), isMain ? 1.2 : 0.6, {units: 'meters'});
        if(poly) { poly.properties = { color: '#ffffff', _opacity: isMain ? 0.4 : 0.15, _baseHeight: 0, _height: 0.1, layer: "Sun Path Compass" }; compassFeats.push(poly); }
      }
      
      pathFeats.forEach(f => f.properties.layer = "Sun Path 3D Mesh");
      
      // O SEGREDO DO GEOSAMPA: Injeta o GeoJSON direto no Giraffe!
      const safeFeats = JSON.parse(JSON.stringify([...compassFeats, ...pathFeats])).map(feat => {
        if (feat.properties) {
          feat.properties.baseHeight = feat.properties._baseHeight;
          feat.properties.height = feat.properties._height;
          feat.properties.fill = feat.properties.color;
        }
        return feat;
      });
      
      await rpc.invoke('updateGeoJSONLayerContents', ['☀ Sun Path 3D (Baked)', { type: 'FeatureCollection', features: safeFeats }]);
      
      alert('Geometria 3D fixada no projeto com sucesso!');
    } catch (e) {
      console.error(e);
      alert('Erro ao salvar no projeto. Verifique o console ou a conexão.');
    }
    setIsBaking(false);
  };

  const syncInfo={ ok: {msg:'✓ Sombras Sincronizadas', cls:'text-emerald-400'}, syncing: {msg:'⟳ Calculando...', cls:'text-amber-400'}, night: {msg:'☾ Sol abaixo do horizonte', cls:'text-slate-500'}, no_views:{msg:'⚠ Crie uma View no projeto', cls:'text-red-400'}, error: {msg:'⚠ Erro — ver console (F12)', cls:'text-red-400'}, idle: {msg:'', cls:''} }[syncSt]||{msg:'',cls:''};
  const eqActive=doy===79||doy===266; const eqSub=doy===266?'23 Set':'20 Mar';

  return h('div',{className:'h-screen flex flex-col p-3 gap-3 bg-[#0f1117]'},
    h('div',{className:'flex items-center justify-between border-b border-slate-800 pb-2.5'},
      h('div',null, h('h1',{className:'text-base font-semibold text-white'},'☀ LB Sun Path 3D [vG11]'), h('p',{className:'text-[10px] text-slate-600 mt-0.5'},`${lat.toFixed(4)}° · ${lng.toFixed(4)}°`)),
      syncInfo.msg&&h('span',{className:`text-[9px] px-2 py-1 bg-slate-900 rounded ${syncInfo.cls}`},syncInfo.msg)
    ),
    h('div',{className:'flex-1 overflow-y-auto kv-scroll flex flex-col gap-3'},
      h(MiniSolarChart,{lat,lng,doy,sunRes:sunNow,seas}),
      h('div',{className:'grid grid-cols-3 gap-2'},
        ...[{e:'☀',l:'Verão', ac:doy===seas.sum, bc:'amber', fn:()=>setDoy(seas.sum), sub:seas.sumLbl.split(' ')[1]}, {e:'❄',l:'Inverno', ac:doy===seas.win, bc:'sky', fn:()=>setDoy(seas.win), sub:seas.winLbl.split(' ')[1]}, {e:'◎',l:'Equinócio',ac:eqActive, bc:'emerald',fn:()=>setDoy(d=>d===79?266:79), sub:eqSub}].map(({e,l,ac,bc,fn,sub})=>{
          const C={amber:{b:'border-amber-500/25',t:'text-amber-400',bg:'bg-amber-500/10'}, sky: {b:'border-sky-500/25', t:'text-sky-400', bg:'bg-sky-500/10'}, emerald:{b:'border-emerald-500/25',t:'text-emerald-400',bg:'bg-emerald-500/10'}}[bc];
          return h('button',{key:l,onClick:fn, className:`flex flex-col items-center py-2 px-1 rounded border transition-all ${C.b} ${ac?C.bg:'bg-transparent hover:bg-white/[.02]'}`}, h('span',{className:'text-sm leading-none'},e), h('span',{className:`text-[10px] font-semibold ${C.t}`},l), h('span',{className:'text-[9px] text-slate-600'},sub));
        })
      ),
      h('div',{className:'bg-[#111827] rounded-lg border border-slate-800 p-3 flex flex-col gap-4'},
        ...[{l:'Horário', v:fmtH(hr), min:0, max:23.99,step:.25,val:hr, fn:v=>setHr(+v)}, {l:'Data', v:fmtD(doy),min:1, max:365, step:1, val:doy, fn:v=>setDoy(+v)}, {l:'Raio', v:rad+'m', min:50, max:500, step:10, val:rad, fn:v=>setRad(+v)}].map(({l,v,min,max,step,val,fn})=>h('div',{key:l}, h('div',{className:'flex justify-between text-[11px] mb-2'}, h('span',{className:'text-slate-400'},l), h('span',{className:'text-amber-400'},v)), h('input',{type:'range',className:'kv-slider',min,max,step,value:val,onChange:e=>fn(e.target.value)})))
      ),
      h('div',{className:'p-3 bg-[#111827] rounded-lg border border-slate-800 mb-1'},
        h('div',{className:'flex items-center justify-between mb-3'},
          h('div',null, h('span',{className:'text-sm font-medium text-slate-300'},'Carta Solar no Mapa 3D'), h('p',{className:'text-[10px] text-slate-600 mt-0.5'},showChart?'Ligado — layers visíveis':'Desligado (padrão)')),
          h('button',{className:`toggle ${showChart?'on':''}`,onClick:()=>setShowChart(v=>!v)})
        ),
        h('button', {
          className: `w-full py-2 rounded border border-amber-500/30 bg-amber-500/10 text-amber-500 text-[11px] font-bold uppercase tracking-wider hover:bg-amber-500/20 transition-colors ${isBaking ? 'opacity-50 cursor-wait' : ''}`,
          onClick: handleBake
        }, isBaking ? 'Assando Geometria 3D...' : '⇩ Fixar Carta no Projeto (Bake)')
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(SolarApp));
</script>
