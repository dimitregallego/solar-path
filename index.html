<body class="bg-[#0f1117] text-slate-200">
<div id="root"></div>

<script type="module">
import { createElement as h, useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import { giraffeState, rpc } from 'https://esm.sh/@gi-nx/iframe-sdk@latest';
// Sem turf.js para evitar crash no SDK do Giraffe!

const D2R = Math.PI/180, R2D = 180/Math.PI;

const COLOR = {
  MONTHS: ['#fff7ad', '#ffe491', '#ffd175', '#ffbe59', '#ffaa3d', '#ff9621', '#ff8205', '#f26e00', '#e55a00', '#d84600', '#cc3200', '#bf1e00'],
  ANALEMMAS: '#40a0ff'
};

function julianDay(doy, hr, yr=2000) {
  const lp=(yr%4===0&&yr%100!==0)||yr%400===0;
  const ml=[0,31,lp?29:28,31,30,31,30,31,31,30,31,30,31];
  let m=1,r=doy; while(r>ml[m]&&m<12){r-=ml[m];m++;}
  let Y=yr,M=m; if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+r+B-1524.5+hr/24;
}

function calcSun(lat, lng, doy, hr) {
  const JD=julianDay(doy,hr), T=(JD-2451545)/36525;
  let L0=280.46646+T*(36000.76983+T*0.0003032); L0=((L0%360)+360)%360;
  let M=357.52911+T*(35999.05029-0.0001537*T);  M=((M%360)+360)%360;
  const Mr=M*D2R, e=0.016708634-T*(0.000042037+0.0000001267*T);
  const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const sl=L0+C, om=125.04-1934.136*T;
  const la=sl-0.00569-0.00478*Math.sin(om*D2R);
  const e0=23+(26+(21.448-T*(46.815+T*(0.00059-T*0.001813)))/60)/60;
  const ep=e0+0.00256*Math.cos(om*D2R), er=ep*D2R;
  const dec=Math.asin(Math.max(-1,Math.min(1,Math.sin(er)*Math.sin(la*D2R))))*R2D;
  const y=Math.pow(Math.tan(er/2),2), L0r=L0*D2R;
  const eot=4*R2D*(y*Math.sin(2*L0r)-2*e*Math.sin(Mr)+4*e*y*Math.sin(Mr)*Math.cos(2*L0r)-0.5*y*y*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));
  const tz=Math.round(lng/15);
  let tst=(hr*60+eot+4*lng-60*tz); tst=((tst%1440)+1440)%1440;
  const sn=(720-4*lng-eot+tz*60)/60, ha=(tst/4)-180;
  const har=ha*D2R, latr=lat*D2R, decr=dec*D2R;
  const cosZ=Math.sin(latr)*Math.sin(decr)+Math.cos(latr)*Math.cos(decr)*Math.cos(har);
  const zen=Math.acos(Math.max(-1,Math.min(1,cosZ)))*R2D, alt=90-zen;
  const sinZ=Math.sin(zen*D2R); let az;
  if(Math.abs(sinZ)<1e-10){ az=lat>=0?180:0; } else {
    const ca=(Math.sin(latr)*cosZ-Math.sin(decr))/(Math.cos(latr)*sinZ);
    const ar=Math.acos(Math.max(-1,Math.min(1,ca)));
    az=ha>0?(ar*R2D+180)%360:(540-ar*R2D)%360;
  }
  return { alt, az, sn, day: alt>-0.83 };
}

async function syncGiraffeSun(az, alt) {
  if(alt < -5) return { ok:false, why:'night' };
  const views = giraffeState.get('views') || [];
  if(!views.length) return { ok:false, why:'no_views' };
  let safeView;
  try { safeView = JSON.parse(JSON.stringify(views[0])); }
  catch { safeView = { id: views[0].id, name: views[0].name || '', layerTree: views[0].layerTree || [] }; }
  const patchedView = { ...safeView, sun: { ...(safeView.sun || {}), azimuth: az, altitude: alt }, sunAzimuth: az, sunAltitude: alt };
  try { await rpc.invoke('activateViewLayers', [patchedView]); return { ok:true }; }
  catch(e) { return { ok:false, why:'error' }; }
}

function local2geo(x, y, oLng, oLat) {
  return [ oLng + x / (111320 * Math.cos(oLat*D2R)), oLat + y / 111320 ];
}

function makeCircle(lat, lng, radiusM, steps=72) {
  const pts = [];
  for(let i=0; i<=steps; i++) {
    const t = (i/steps)*2*Math.PI;
    pts.push(local2geo(radiusM*Math.sin(t), radiusM*Math.cos(t), lng, lat));
  }
  return pts;
}

function feat(geomType, coords, props={}) { return { type:'Feature', geometry:{ type:geomType, coordinates:coords }, properties:props }; }
const fc = (features) => ({ type:'FeatureCollection', features });

const seasons = lat => {
  const S=lat<0;
  return { sum:S?355:172, win:S?172:355, eqMar:79, eqSep:266, sumLbl:S?'Verão (Dez)':'Verão (Jun)', winLbl:S?'Inverno (Jun)':'Inverno (Dez)' };
};

const L = { RING_H:'sp-rh', RINGS:'sp-rg', AZ_C:'sp-azc', AZ_M:'sp-azm', DOME_3D:'sp-d3', LABELS:'sp-lb', PATHS:'sp-paths', TOD:'sp-to', POLE:'sp-po', DOT:'sp-dt' };
const rm = async id => { try{ await rpc.invoke('removeTempLayer',[id]); }catch{} };
const rmAll = () => Promise.allSettled(Object.values(L).map(rm));

// ══════════════════════════════════════════════════════════════════════
//  COMPASSO & GAIOLA
// ══════════════════════════════════════════════════════════════════════
async function plotCompassGround(lat, lng, radius) {
  await rm(L.RING_H); await rm(L.RINGS); await rm(L.AZ_C); await rm(L.AZ_M); await rm(L.LABELS);
  const horizonPts = makeCircle(lat, lng, radius);           
  const innerRings = [];
  for(const alt of [10,20,30,40,50,60,70,80]) {
    const rr = radius * Math.cos(alt*D2R);
    if(rr < 1) continue;
    innerRings.push(feat('LineString', makeCircle(lat, lng, rr)));
  }

  await rpc.invoke('addTempLayerGeoJSON', [L.RING_H, fc([feat('LineString', horizonPts)]), { type:'line', paint:{ 'line-color':'#ffffff','line-width':1.5,'line-opacity':0.35 }, layout:{ 'line-cap':'round' } }]);
  if(innerRings.length) await rpc.invoke('addTempLayerGeoJSON', [L.RINGS, fc(innerRings), { type:'line', paint:{ 'line-color':'#ffffff','line-width':0.6,'line-opacity':0.14 }, layout:{ 'line-cap':'round' } }]);

  const cardLines = [], minorLines = [];
  for(let az=0; az<360; az+=10) {
    const ar = az*D2R;
    const start = local2geo(radius*0.04*Math.sin(ar), radius*0.04*Math.cos(ar), lng, lat);
    const end   = local2geo(radius*Math.sin(ar), radius*Math.cos(ar), lng, lat);
    if(az%90===0) cardLines.push(feat('LineString', [start, end]));
    else if(az%30===0) cardLines.push(feat('LineString',[start,end])); 
    else minorLines.push(feat('LineString', [start, end]));
  }

  if(cardLines.length) await rpc.invoke('addTempLayerGeoJSON', [L.AZ_C, fc(cardLines), { type:'line', paint:{ 'line-color':'#ffffff','line-width':0.8,'line-opacity':0.25 } }]);
  if(minorLines.length) await rpc.invoke('addTempLayerGeoJSON', [L.AZ_M, fc(minorLines), { type:'line', paint:{ 'line-color':'#ffffff','line-width':0.35,'line-opacity':0.08 } }]);

  const lblR = radius * 1.13;
  const lblDefs = [{az:0,l:'N'},{az:30,l:'30°'},{az:60,l:'60°'},{az:90,l:'L'},{az:120,l:'120°'},{az:150,l:'150°'},{az:180,l:'S'},{az:210,l:'210°'},{az:240,l:'240°'},{az:270,l:'O'},{az:300,l:'300°'},{az:330,l:'330°'}];
  const lblFeats = lblDefs.map(({az,l}) => feat('Point', local2geo(lblR*Math.sin(az*D2R), lblR*Math.cos(az*D2R), lng, lat), { label:l }));
  
  await rpc.invoke('addTempLayerGeoJSON', [L.LABELS, fc(lblFeats), { type:'symbol', layout:{ 'text-field': ['get','label'], 'text-size': 11, 'text-pitch-alignment': 'map', 'text-rotation-alignment': 'map' }, paint:{ 'text-color':'#94a3b8','text-halo-color':'#0f1117','text-halo-width':1.5 } }]);
}

async function plotDome3D(lat, lng, radius) {
  await rm(L.DOME_3D);
  const rings = [];
  for(const alt of [10,20,30,40,50,60,70,80]) {
    const rh = radius*Math.cos(alt*D2R), z = radius*Math.sin(alt*D2R);
    if(rh < 1) continue;
    const coords = [];
    for(let i=0; i<=72; i++) {
      const t=(i/72)*2*Math.PI;
      const [ln,la]=local2geo(rh*Math.sin(t),rh*Math.cos(t),lng,lat);
      coords.push([ln,la,z]); 
    }
    rings.push(feat('LineString', coords));
  }
  if(!rings.length) return;
  await rpc.invoke('addTempLayerGeoJSON', [L.DOME_3D, fc(rings), { type:'line', paint:{ 'line-color':'#ffffff','line-width':0.5,'line-opacity':0.12 }, layout:{ 'line-cap':'round' } }]);
}

// ══════════════════════════════════════════════════════════════════════
//  NOVA MALHA LADYBUG 3D (Substitui os 3 arcos fixos por malha completa)
// ══════════════════════════════════════════════════════════════════════
async function plotAnalyticWireframes(lat, lng, radius, currentDoy) {
  await rm(L.PATHS);
  const features = [];
  const seasonSteps = lat < 0 ? [355, 17, 46, 79, 107, 137, 172, 199, 229, 266, 292, 321] : [172, 199, 229, 266, 292, 321, 355, 17, 46, 79, 107, 137];
  
  // 12 Arcos Mensais
  for (let m = 0; m < 12; m++) {
    const doy = seasonSteps[m];
    const coords = [];
    for (let h = 0; h <= 24; h += 0.25) {
      const sun = calcSun(lat, lng, doy, h);
      if (!sun.day && sun.alt < -1) continue;
      const a = sun.alt*D2R, z = sun.az*D2R;
      const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
      coords.push([ln, la, Math.max(0, radius*Math.sin(a))]); // Coordenada Z inserida!
    }
    if (coords.length > 1) features.push(feat('LineString', coords, { color: COLOR.MONTHS[m % 12], width: 1.5, opacity: 0.65 }));
  }

  // Analemas Horários (Curvas em 8)
  for (let h = 8; h <= 18; h += 1) {
    const coords = [];
    for (let doy = 1; doy <= 365; doy += 5) {
      const sun = calcSun(lat, lng, doy, h);
      if (!sun.day || sun.alt <= 0) continue;
      const a = sun.alt*D2R, z = sun.az*D2R;
      const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
      coords.push([ln, la, Math.max(0, radius*Math.sin(a))]);
    }
    if (coords.length > 2) {
      coords.push(coords[0]); // Fecha o loop do 8
      features.push(feat('LineString', coords, { color: COLOR.ANALEMMAS, width: 1.2, opacity: 0.5 }));
    }
  }

  await rpc.invoke("addTempLayerGeoJSON", [L.PATHS, fc(features), { type: "line", paint: { "line-color": ["get", "color"], "line-width": ["get", "width"], "line-opacity": ["get", "opacity"] }, layout: { "line-cap": "round", "line-join": "round" } }]);
}

async function plotTodayArc(lat, lng, doy, radius) {
  await rm(L.TOD);
  const coords = [];
  for(let hr=0; hr<=24; hr+=0.2) {
    const s=calcSun(lat,lng,doy,hr);
    if(!s.day||s.alt<-0.5) continue;
    const a=s.alt*D2R, z=s.az*D2R;
    const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
    coords.push([ln, la, Math.max(0, radius*Math.sin(a))]);
  }
  if(coords.length < 2) return;
  await rpc.invoke('addTempLayerGeoJSON', [L.TOD, fc([feat('LineString', coords)]), { type:'line', paint:{ 'line-color':'#ffffff','line-width':3,'line-opacity':1 }, layout:{ 'line-cap':'round' } }]);
}

async function plotSunDot(lat, lng, doy, hr, radius) {
  await rm(L.DOT); await rm(L.POLE);
  const s=calcSun(lat,lng,doy,hr); if(!s.day) return;
  const a=s.alt*D2R, z=s.az*D2R;
  const elev=Math.max(0,radius*Math.sin(a));
  const [sLng, sLat] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
  const col=s.alt>20?'#F59E0B':s.alt>5?'#D97706':'#B45309';
  
  // Mastro
  await rpc.invoke('addTempLayerGeoJSON',[L.POLE, fc([feat('LineString',[[sLng,sLat,0],[sLng,sLat,elev]])]), { type:'line', paint:{'line-color':col,'line-width':2,'line-opacity':0.7,'line-dasharray':[2,2]} }]);
  
  // Bolinha (Injetado _baseHeight caso o Giraffe precise para elevar o circle)
  await rpc.invoke('addTempLayerGeoJSON',[L.DOT, fc([feat('Point',[sLng,sLat,elev], {_baseHeight: elev, _height: elev+2})]), { type:'circle', paint:{'circle-color':col,'circle-radius':10,'circle-opacity':1,'circle-pitch-
