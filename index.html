  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<body class="bg-[#0f1117] text-slate-200">
<div id="root"></div>

<script type="module">
import { createElement as h, useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import { giraffeState, rpc } from 'https://esm.sh/@gi-nx/iframe-sdk@latest';
import * as turf from 'https://esm.sh/@turf/turf@6.5.0';

const D2R = Math.PI/180, R2D = 180/Math.PI;

const COLOR = {
  MONTHS: ['#fff7ad', '#ffe491', '#ffd175', '#ffbe59', '#ffaa3d', '#ff9621', '#ff8205', '#f26e00', '#e55a00', '#d84600', '#cc3200', '#bf1e00'],
  ANALEMMAS: '#40a0ff', SUN: ['#D97706', '#F59E0B']
};

const L = { PATHS:'sp-paths', COMPASS:'sp-compass', LABELS:'sp-labels', DOT:'sp-dot', POLE:'sp-pole', DAYARC:'sp-dayarc' };

const seasons = lat => {
  const S = lat < 0;
  return { sum: S?355:172, win: S?172:355, eqMar: 79, eqSep: 266, sumLbl: S?'Verão (Dez)':'Verão (Jun)', winLbl: S?'Inverno (Jun)':'Inverno (Dez)' };
};

// ─── MATEMÁTICA SOLAR ────────────────────────────────────────────────────────
function julianDay(doy, hr, yr=2000) {
  const lp=(yr%4===0&&yr%100!==0)||yr%400===0;
  const ml=[0,31,lp?29:28,31,30,31,30,31,31,30,31,30,31];
  let m=1,r=doy; while(r>ml[m]&&m<12){r-=ml[m];m++;}
  let Y=yr,M=m; if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+r+B-1524.5+hr/24;
}

function calcSun(lat, lng, doy, hr) {
  const JD=julianDay(doy,hr), T=(JD-2451545)/36525;
  let L0=280.46646+T*(36000.76983+T*0.0003032); L0=((L0%360)+360)%360;
  let M=357.52911+T*(35999.05029-0.0001537*T);  M=((M%360)+360)%360;
  const Mr=M*D2R, e=0.016708634-T*(0.000042037+0.0000001267*T);
  const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const sl=L0+C, om=125.04-1934.136*T;
  const la=sl-0.00569-0.00478*Math.sin(om*D2R);
  const e0=23+(26+(21.448-T*(46.815+T*(0.00059-T*0.001813)))/60)/60;
  const ep=e0+0.00256*Math.cos(om*D2R), er=ep*D2R;
  const dec=Math.asin(Math.max(-1,Math.min(1,Math.sin(er)*Math.sin(la*D2R))))*R2D;
  const y=Math.pow(Math.tan(er/2),2), L0r=L0*D2R;
  const eot=4*R2D*(y*Math.sin(2*L0r)-2*e*Math.sin(Mr)+4*e*y*Math.sin(Mr)*Math.cos(2*L0r)-0.5*y*y*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));
  const tz=Math.round(lng/15);
  let tst=(hr*60+eot+4*lng-60*tz); tst=((tst%1440)+1440)%1440;
  const sn=(720-4*lng-eot+tz*60)/60, ha=(tst/4)-180;
  const har=ha*D2R, latr=lat*D2R, decr=dec*D2R;
  const cosZ=Math.sin(latr)*Math.sin(decr)+Math.cos(latr)*Math.cos(decr)*Math.cos(har);
  const zen=Math.acos(Math.max(-1,Math.min(1,cosZ)))*R2D, alt=90-zen;
  const sinZ=Math.sin(zen*D2R); let az;
  if(Math.abs(sinZ)<1e-10){ az=lat>=0?180:0; } else {
    const ca=(Math.sin(latr)*cosZ-Math.sin(decr))/(Math.cos(latr)*sinZ);
    const ar=Math.acos(Math.max(-1,Math.min(1,ca)));
    az=ha>0?(ar*R2D+180)%360:(540-ar*R2D)%360;
  }
  return { alt, az, sn, day: alt>-0.83 };
}

async function syncGiraffeSun(az, alt) {
  if(alt < -5) return { ok:false, why:'night' };
  const views = giraffeState.get('views') || [];
  if(!views.length) return { ok:false, why:'no_views' };
  let safeView;
  try { safeView = JSON.parse(JSON.stringify(views[0])); }
  catch { safeView = { id: views[0].id, name: views[0].name || '', layerTree: views[0].layerTree || [] }; }
  const patchedView = { ...safeView, sun: { ...(safeView.sun || {}), azimuth: az, altitude: alt }, sunAzimuth: az, sunAltitude: alt };
  try { await rpc.invoke('activateViewLayers', [patchedView]); return { ok:true }; }
  catch(e) { return { ok:false, why:'error' }; }
}

// ─── FATIADOR DE LINHAS 3D (SEM HEIGHT, COM STROKE PARA COR) ─────────────────
function local2geo(x, y, oLng, oLat) { return [ oLng + x / (111320 * Math.cos(oLat*D2R)), oLat + y / 111320 ]; }
const fc = (features) => ({ type:'FeatureCollection', features });
const rm = async id => { try{ await rpc.invoke('removeTempLayer',[id]); }catch{} };

function segmentLine3D(coords3D, properties) {
  const segments = [];
  for (let i = 0; i < coords3D.length - 1; i++) {
    const p1 = coords3D[i], p2 = coords3D[i+1];
    if (p1[2] < -1 && p2[2] < -1) continue; 
    
    const z = (p1[2] + p2[2]) / 2;
    
    const line = turf.lineString([p1, p2]);
    
    // Injetamos a altura de flutuação e a cor como STROKE (padrão de linha)
    line.properties = { 
      ...properties, 
      _baseHeight: z, 
      baseHeight: z
    };
    segments.push(line);
  }
  return segments;
}

function generateAnalyticMesh(lat, lng, radius, currentDoy) {
  const features = [];
  const seasonSteps = lat < 0 ? [355, 17, 46, 79, 107, 137, 172, 199, 229, 266, 292, 321] : [172, 199, 229, 266, 292, 321, 355, 17, 46, 79, 107, 137];
  
  for (let m = 0; m < 12; m++) {
    const doy = seasonSteps[m];
    const coords3D = [];
    for (let h = 0; h <= 24; h += 0.15) {
      const sun = calcSun(lat, lng, doy, h);
      if (!sun.day && sun.alt < -1) continue;
      const a = sun.alt*D2R, z = sun.az*D2R;
      const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
      coords3D.push([ln, la, Math.max(0, radius*Math.sin(a))]);
    }
    if (coords3D.length > 1) {
      const isCurrent = Math.abs(doy - currentDoy) < 15;
      features.push(...segmentLine3D(coords3D, { color: COLOR.MONTHS[m % 12], stroke: COLOR.MONTHS[m % 12], width: isCurrent ? 3.5 : 1.5, _opacity: isCurrent ? 1.0 : 0.4 }));
    }
  }

  for (let h = 8; h <= 18; h += 1) {
    const coords3D = [];
    for (let doy = 1; doy <= 365; doy += 2) {
      const sun = calcSun(lat, lng, doy, h);
      if (!sun.day || sun.alt <= 0) continue;
      const a = sun.alt*D2R, z = sun.az*D2R;
      const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
      coords3D.push([ln, la, Math.max(0, radius*Math.sin(a))]);
    }
    if (coords3D.length > 2) {
      coords3D.push(coords3D[0]);
      features.push(...segmentLine3D(coords3D, { color: COLOR.ANALEMMAS, stroke: COLOR.ANALEMMAS, width: 1.5, _opacity: 0.35 }));
    }
  }
  return features;
}

async function plotAnalyticWireframes(lat, lng, radius, currentDoy) {
  await rm(L.PATHS);
  const features = generateAnalyticMesh(lat, lng, radius, currentDoy);
  await rpc.invoke("addTempLayerGeoJSON", [L.PATHS, fc(features), { 
    type: "line", 
    paint: { 
      "line-color": ["get", "color"], 
      "line-width": ["get", "width"], 
      "line-opacity": ["get", "_opacity"] 
    } 
  }]);
}

async function plotSunDotAndPole(lat, lng, doy, hr, radius) {
  await rm(L.DOT); await rm(L.POLE);
  const sun = calcSun(lat, lng, doy, hr); if(!sun.day) return;
  const a = sun.alt*D2R, z = sun.az*D2R;
  const coordZ = Math.max(0, radius*Math.sin(a));
  const [sLng, sLat] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
  const col = sun.alt>20 ? COLOR.SUN[1] : COLOR.SUN[0];
  
  const poleLine = turf.lineString([[sLng, sLat, 0], [sLng, sLat, coordZ]], { color: col, width: 2, _opacity: 0.6 });
  await rpc.invoke("addTempLayerGeoJSON", [L.POLE, fc([poleLine]), { 
    type: "line", 
    paint: { 
      "line-color": ["get", "color"], 
      "line-width": ["get", "width"], 
      "line-opacity": ["get", "_opacity"],
      "line-dasharray": [2, 2]
    } 
  }]);
  
  // Sol como fill-extrusion (elemento nativo 3D do Giraffe que respeita _baseHeight)
  const dotRadius = Math.max(1.5, radius * 0.02);  // ~2% do raio, mín 1.5m
  const dotPoly = turf.buffer(turf.point([sLng, sLat]), dotRadius, { units: 'meters' });
  dotPoly.properties = { color: col, _baseHeight: coordZ, _height: coordZ + dotRadius * 1.5, _opacity: 1 };
  await rpc.invoke("addTempLayerGeoJSON", [L.DOT, fc([dotPoly]), {
    type: "fill-extrusion",
    paint: {
      "fill-extrusion-color": ["get", "color"],
      "fill-extrusion-base": ["get", "_baseHeight"],
      "fill-extrusion-height": ["get", "_height"],
      "fill-extrusion-opacity": ["get", "_opacity"]
    }
  }]);
}

async function plotCompassGround(lat, lng, radius) {
  await rm(L.COMPASS); await rm(L.LABELS);
  const features = [], labels = [];
  const center = [lng, lat];

  for (let r = radius * 0.33; r <= radius; r += radius * 0.33) {
    const ring = [];
    for (let angle = 0; angle <= 360; angle += 5) ring.push(turf.destination(turf.point(center), r/1000, angle, {units: 'kilometers'}).geometry.coordinates);
    features.push(turf.lineString(ring, { color: '#4a5568', width: 1, opacity: 0.35 }));
  }

  for (let angle = 0; angle < 360; angle += 15) {
    const far = turf.destination(turf.point(center), radius/1000, angle, {units: 'kilometers'}).geometry.coordinates;
    const isMain = angle % 90 === 0;
    features.push(turf.lineString([center, far], { color: '#4a5568', width: isMain ? 1.5 : 0.8, opacity: isMain ? 0.5 : 0.25 }));
    if (angle % 30 === 0) {
      let lbl = angle + '°';
      if(angle === 0) lbl = 'N'; else if(angle === 90) lbl = 'L'; else if(angle === 180) lbl = 'S'; else if(angle === 270) lbl = 'O';
      labels.push(turf.destination(turf.point(center), (radius+18)/1000, angle, {units: 'kilometers', properties: { label: lbl }}));
    }
  }

  await rpc.invoke("addTempLayerGeoJSON", [L.COMPASS, fc(features), { type: "line", paint: { "line-color": ["get", "color"], "line-width": ["get", "width"], "line-opacity": ["get", "opacity"] } }]);
  await rpc.invoke("addTempLayerGeoJSON", [L.LABELS, fc(labels), { type: "symbol", layout: { "text-field": ["get", "label"], "text-size": 12, "text-pitch-alignment": "map", "text-rotation-alignment": "map" }, paint: { "text-color": "#94a3b8", "text-halo-color": "#000000", "text-halo-width": 1.5 } }]);
}

// ─── TRAJETÓRIA DO DIA SELECIONADO EM 3D ─────────────────────────────────────
async function plotDailyArc3D(lat, lng, doy, radius) {
  await rm(L.DAYARC);
  const segs = [], pts = [];
  for (let h = 0; h <= 24; h += 0.12) {
    const s = calcSun(lat, lng, doy, h); if (!s.day && s.alt < -1) continue;
    const a = s.alt*D2R, z = s.az*D2R;
    const [ln, la] = local2geo(radius*Math.cos(a)*Math.sin(z), radius*Math.cos(a)*Math.cos(z), lng, lat);
    pts.push([ln, la, Math.max(0, radius*Math.sin(a))]);
  }
  if (pts.length < 2) return;
  const segW = Math.max(0.12, radius * 0.0015);  // ~0.15% do raio, mín 12cm
  for (let i = 0; i < pts.length - 1; i++) {
    const p1 = pts[i], p2 = pts[i+1]; if (p1[2] < -1 && p2[2] < -1) continue;
    const line = turf.lineString([[p1[0],p1[1]],[p2[0],p2[1]]]);
    const poly = turf.buffer(line, segW, { units: 'meters' });
    if (poly) {
      const midZ = Math.max(0, (p1[2]+p2[2])/2);
      poly.properties = { color:'#F59E0B', _baseHeight: Math.max(0, midZ - segW*0.5), _height: midZ + segW*0.5, _opacity: 0.95 };
      segs.push(poly);
    }
  }
  if (!segs.length) return;
  await rpc.invoke('addTempLayerGeoJSON', [L.DAYARC, fc(segs), {
    type: 'fill-extrusion',
    paint: { 'fill-extrusion-color':['get','color'], 'fill-extrusion-base':['get','_baseHeight'], 'fill-extrusion-height':['get','_height'], 'fill-extrusion-opacity':['get','_opacity'] }
  }]);
}

// ─── GERADOR GLB ─────────────────────────────────────────────────────────────
// Gera a carta solar estática completa como arquivo .glb (sem trajetória diária)
function hex2rgb(hex){return[parseInt(hex.slice(1,3),16)/255,parseInt(hex.slice(3,5),16)/255,parseInt(hex.slice(5,7),16)/255];}

function buildRibbon(pts, halfW=0.05, vertical=true){
  if(pts.length<2)return null;
  const pos=[],idx=[];let mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];
  for(let i=0;i<pts.length;i++){
    const p=pts[i];let ox,oy,oz;
    if(vertical){ox=0;oy=0;oz=halfW;}
    else{let dx,dy;if(i<pts.length-1){dx=pts[i+1][0]-p[0];dy=pts[i+1][1]-p[1];}else{dx=p[0]-pts[i-1][0];dy=p[1]-pts[i-1][1];}const ln=Math.sqrt(dx*dx+dy*dy)||1;ox=-dy/ln*halfW;oy=dx/ln*halfW;oz=0;}
    const ax=p[0]+ox,ay=p[2]+oz,az=-(p[1]+oy),bx=p[0]-ox,by=p[2]-oz,bz=-(p[1]-oy);
    pos.push(ax,ay,az,bx,by,bz);
    for(const[x,y,z]of[[ax,ay,az],[bx,by,bz]]){if(x<mn[0])mn[0]=x;if(x>mx[0])mx[0]=x;if(y<mn[1])mn[1]=y;if(y>mx[1])mx[1]=y;if(z<mn[2])mn[2]=z;if(z>mx[2])mx[2]=z;}
    if(i>0){const b2=(i-1)*2,c=i*2;idx.push(b2,b2+1,c+1,b2,c+1,c);}
  }
  return{positions:new Float32Array(pos),indices:new Uint16Array(idx),min:mn,max:mx};
}

function mergeRibbons(ribbons){
  if(!ribbons.length)return null;let tP=0,tI=0;for(const r of ribbons){tP+=r.positions.length;tI+=r.indices.length;}
  const P=new Float32Array(tP),I=new Uint16Array(tI);let pO=0,iO=0,vO=0,mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];
  for(const r of ribbons){P.set(r.positions,pO);for(let i=0;i<r.indices.length;i++)I[iO+i]=r.indices[i]+vO;pO+=r.positions.length;iO+=r.indices.length;vO+=r.positions.length/3;for(let j=0;j<3;j++){mn[j]=Math.min(mn[j],r.min[j]);mx[j]=Math.max(mx[j],r.max[j]);}}
  return{positions:P,indices:I,min:mn,max:mx};
}

function generateGLBGeometry(lat, lng, radius){
  const groups=[];
  const seasonSteps=lat<0?[355,17,46,79,107,137,172,199,229,266,292,321]:[172,199,229,266,292,321,355,17,46,79,107,137];
  const halfW=Math.max(0.06, radius*0.0008);
  // 12 arcos mensais
  for(let m=0;m<12;m++){
    const pts=[];
    for(let h=0;h<=24;h+=0.15){const s=calcSun(lat,lng,seasonSteps[m],h);if(!s.day&&s.alt<-1)continue;const a=s.alt*D2R,z=s.az*D2R;pts.push([radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),Math.max(0,radius*Math.sin(a))]);}
    if(pts.length>1){const rb=buildRibbon(pts,halfW,true);if(rb){rb.color=hex2rgb(COLOR.MONTHS[m]);groups.push(rb);}}
  }
  // Analemas
  const anaR=[];
  for(let h=8;h<=18;h+=1){const pts=[];for(let d=1;d<=365;d+=2){const s=calcSun(lat,lng,d,h);if(!s.day||s.alt<=0)continue;const a=s.alt*D2R,z=s.az*D2R;pts.push([radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),Math.max(0,radius*Math.sin(a))]);}if(pts.length>2){pts.push(pts[0]);const rb=buildRibbon(pts,halfW*0.7,true);if(rb)anaR.push(rb);}}
  if(anaR.length){const m=mergeRibbons(anaR);m.color=hex2rgb(COLOR.ANALEMMAS);groups.push(m);}
  // Gaiola 3D
  const dR=[];for(const alt of[10,20,30,40,50,60,70,80]){const rr=radius*Math.cos(alt*D2R),zz=radius*Math.sin(alt*D2R);if(rr<1)continue;const pts=[];for(let i=0;i<=90;i++){const t=(i/90)*2*Math.PI;pts.push([rr*Math.sin(t),rr*Math.cos(t),zz]);}const rb=buildRibbon(pts,halfW*0.6,true);if(rb)dR.push(rb);}
  if(dR.length){const m=mergeRibbons(dR);m.color=[0.35,0.35,0.35];groups.push(m);}
  // Compasso no chão
  const cR=[];
  for(const alt of[0,30,60]){const rr=radius*Math.cos(alt*D2R);if(rr<1)continue;const pts=[];for(let i=0;i<=90;i++){const t=(i/90)*2*Math.PI;pts.push([rr*Math.sin(t),rr*Math.cos(t),0]);}const rb=buildRibbon(pts,alt===0?halfW*1.5:halfW*0.8,false);if(rb)cR.push(rb);}
  for(let az=0;az<360;az+=10){const ar=az*D2R,pts=[[0,0,0],[radius*Math.sin(ar),radius*Math.cos(ar),0]];const rb=buildRibbon(pts,az%90===0?halfW:halfW*0.5,false);if(rb)cR.push(rb);}
  if(cR.length){const m=mergeRibbons(cR);m.color=[0.29,0.34,0.41];groups.push(m);}
  return groups;
}

function buildGLB(groups){
  let totalBin=0;const offsets=[];
  for(const g of groups){const pOff=totalBin;totalBin+=g.positions.byteLength;totalBin=(totalBin+3)&~3;const iOff=totalBin;totalBin+=g.indices.byteLength;totalBin=(totalBin+3)&~3;offsets.push({pOff,pLen:g.positions.byteLength,iOff,iLen:g.indices.byteLength});}
  const binBuf=new ArrayBuffer(totalBin),binU8=new Uint8Array(binBuf);
  for(let i=0;i<groups.length;i++){binU8.set(new Uint8Array(groups[i].positions.buffer,groups[i].positions.byteOffset,groups[i].positions.byteLength),offsets[i].pOff);binU8.set(new Uint8Array(groups[i].indices.buffer,groups[i].indices.byteOffset,groups[i].indices.byteLength),offsets[i].iOff);}
  const bv=[],acc=[],meshes=[],mats=[],nodes=[];let bvI=0,acI=0;
  for(let i=0;i<groups.length;i++){
    const g=groups[i],o=offsets[i];
    mats.push({pbrMetallicRoughness:{baseColorFactor:[...g.color,0.9],metallicFactor:0,roughnessFactor:0.9},doubleSided:true,alphaMode:'BLEND'});
    bv.push({buffer:0,byteOffset:o.pOff,byteLength:o.pLen,target:34962});bv.push({buffer:0,byteOffset:o.iOff,byteLength:o.iLen,target:34963});
    acc.push({bufferView:bvI,componentType:5126,count:g.positions.length/3,type:'VEC3',min:g.min.map(v=>+v.toFixed(4)),max:g.max.map(v=>+v.toFixed(4))});
    acc.push({bufferView:bvI+1,componentType:5123,count:g.indices.length,type:'SCALAR'});
    meshes.push({primitives:[{attributes:{POSITION:acI},indices:acI+1,material:i}]});nodes.push({mesh:i});bvI+=2;acI+=2;
  }
  const gltf={asset:{version:'2.0',generator:'KV Sun Path vG16'},scene:0,scenes:[{nodes:nodes.map((_,i)=>i)}],nodes,meshes,accessors:acc,bufferViews:bv,buffers:[{byteLength:totalBin}],materials:mats};

  const bs=20+jsonBytes.length;dv2.setUint32(bs,totalBin,true);dv2.setUint32(bs+4,0x004E4942,true);new Uint8Array(glb,bs+8).set(binU8);

function downloadSolarGLB(lat, lng, radius){
  const groups=generateGLBGeometry(lat,lng,radius);
  const blob=buildGLB(groups);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`sun-path-${Math.abs(lat).toFixed(1)}${lat<0?'S':'N'}-r${radius}m.glb`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  console.log(`[SunPath] ✓ GLB ${(blob.size/1024).toFixed(0)}KB`);
}

// ─── CARTA SOLAR SVG ─────────────────────────────────────────────────────────
const SR=85, SCX=100, SCY=100;
const sun2svg = (alt,az) => { const r=SR*Math.cos(alt*D2R); return [SCX+r*Math.sin(az*D2R), SCY-r*Math.cos(az*D2R)]; };
function buildArcPath(lat,lng,doy) {
  const pts=[];
  for(let h=0;h<=24;h+=0.2){
    const s=calcSun(lat,lng,doy,h); if(!s.day||s.alt<0) continue;
    const [x,y]=sun2svg(s.alt,s.az); pts.push(pts.length===0?`M${x.toFixed(1)},${y.toFixed(1)}`:`L${x.toFixed(1)},${y.toFixed(1)}`);
  }
  return pts.join('');
}

      ...[{t:'N',x:SCX,y:9},{t:'S',x:SCX,y:197},{t:'L',x:194,y:SCY+3},{t:'O',x:6,y:SCY+3}].map(({t,x,y})=>h('text',{key:t,x,y,textAnchor:'middle',fill:'#334155',fontSize:8,fontFamily:'Hind',fontWeight:'600'},t)),
      paths.sum&&h('path',{d:paths.sum,stroke:'#F59E0B',strokeWidth:1.8,fill:'none',opacity:.8}), paths.win&&h('path',{d:paths.win,stroke:'#38BDF8',strokeWidth:1.8,fill:'none',opacity:.75}),
      paths.eq &&h('path',{d:paths.eq, stroke:'#34D399',strokeWidth:1.8,fill:'none',opacity:.75}), paths.tod&&h('path',{d:paths.tod,stroke:'#ffffff',strokeWidth:2,  fill:'none',opacity:.95}),

// ─── INTERFACE REACT ─────────────────────────────────────────────────────────
const fmtH = h => `${String(Math.floor(h)).padStart(2,'0')}:${String(Math.round((h-Math.floor(h))*60)).padStart(2,'0')}`;
const fmtD = d => new Date(new Date().getFullYear(),0,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
const _n=new Date(), _doy=Math.floor((_n-new Date(_n.getFullYear(),0,0))/86400000);
const INIT={lat:-23.55,lng:-46.63,hr:Math.round((_n.getHours()+_n.getMinutes()/60)*4)/4, doy:Math.max(1,Math.min(365,_doy)),radius:100};

function SolarApp() {

      let cLat,cLng;
      if(Array.isArray(raw)){cLng=raw[0];cLat=raw[1];}
      else if(raw.lng!==undefined){cLng=raw.lng;cLat=raw.lat;}
      else if(raw.coordinates){cLng=raw.coordinates[0];cLat=raw.coordinates[1];}
      if(cLat!==undefined&&cLng!==undefined){
        setLat(parseFloat(cLat.toFixed(6)));setLng(parseFloat(cLng.toFixed(6)));
        selectModeRef.current=false;setSelectMode(false);
        console.log(`[SunPath] ✓ Centro: ${cLat.toFixed(5)}, ${cLng.toFixed(5)}`);
      }

  useEffect(()=>{selectModeRef.current=selectMode;},[selectMode]);

  useEffect(()=>{if(syncRef.current)clearTimeout(syncRef.current);syncRef.current=setTimeout(async()=>{setSyncSt('syncing');const r=await syncGiraffeSun(sunNow.az,sunNow.alt);setSyncSt(r.ok?'ok':r.why);},120);return()=>clearTimeout(syncRef.current);},[sunNow]);

  useEffect(()=>{if(!showChart)return;if(dotRef.current)clearTimeout(dotRef.current);dotRef.current=setTimeout(()=>plotSunDotAndPole(lat,lng,doy,hr,rad),80);return()=>clearTimeout(dotRef.current);},[lat,lng,doy,hr,rad,showChart]);

  useEffect(()=>{if(!showChart){Object.values(L).forEach(rm);}},[showChart]);

  useEffect(()=>{
    if(!showChart)return;const gen=++fixGen.current;
    const t=setTimeout(async()=>{
      if(gen!==fixGen.current)return;
      await plotCompassGround(lat,lng,rad);
      await plotAnalyticWireframes(lat,lng,rad,doy);
      await plotDailyArc3D(lat,lng,doy,rad);

  },[lat,lng,rad,doy,showChart]);

  useEffect(()=>()=>Object.values(L).forEach(rm),[]);

  const effRad=Math.round(rad*scaleGLB);

  const handleBake=async(mode)=>{
    if(isBaking)return;setIsBaking(true);
    try{
      const pathFeats=generateAnalyticMesh(lat,lng,effRad,doy);
      const compassFeats=[],center=[lng,lat];
      for(let r=effRad*0.33;r<=effRad;r+=effRad*0.33){const ring=[];for(let a=0;a<=360;a+=5)ring.push(turf.destination(turf.point(center),r/1000,a,{units:'kilometers'}).geometry.coordinates);compassFeats.push(turf.lineString(ring,{color:'#4a5568',stroke:'#4a5568',width:1,_opacity:0.35,_layer:"Sun Path Compass",baseHeight:0,_baseHeight:0}));}
      for(let a=0;a<360;a+=15){const far=turf.destination(turf.point(center),effRad/1000,a,{units:'kilometers'}).geometry.coordinates;const iM=a%90===0;compassFeats.push(turf.lineString([center,far],{color:'#4a5568',stroke:'#4a5568',width:iM?1.5:0.8,_opacity:iM?0.5:0.25,_layer:"Sun Path Compass",baseHeight:0,_baseHeight:0}));}
      const labelFeats=[];
      for(let a=0;a<360;a+=30){const far=turf.destination(turf.point(center),(effRad+effRad*0.18)/1000,a,{units:'kilometers'});let lbl=a+'°';if(a===0)lbl='N';else if(a===90)lbl='L';else if(a===180)lbl='S';else if(a===270)lbl='O';far.properties={label:lbl,stroke:'#94a3b8',_layer:"Sun Path Labels"};labelFeats.push(far);}

      if(mode==='raw'){await rpc.invoke('createRawSections',[safeFeats]);alert('Linhas Editáveis + Labels gerados!');}
      else{await rpc.invoke('updateGeoJSONLayerContents',['☀ Sun Path 3D (Lines)',{type:'FeatureCollection',features:safeFeats}]);alert('Camada 3D fixada com sucesso!');}

    setIsBaking(false);
  };

  const syncInfo={ok:{msg:'✓ Sombras Sincronizadas',cls:'text-emerald-400'},syncing:{msg:'⟳ Calculando...',cls:'text-amber-400'},night:{msg:'☾ Sol abaixo do horizonte',cls:'text-slate-500'},no_views:{msg:'⚠ Crie uma View no projeto',cls:'text-red-400'},error:{msg:'⚠ Erro — ver console (F12)',cls:'text-red-400'},idle:{msg:'',cls:''}}[syncSt]||{msg:'',cls:''};
  const eqActive=doy===79||doy===266; const eqSub=doy===266?'23 Set':'20 Mar';

    h('div',{className:'flex items-center justify-between border-b border-slate-800 pb-2.5'},
      h('div',null,h('h1',{className:'text-base font-semibold text-white'},'☀ LB Sun Path 3D [vG16]'),h('p',{className:'text-[10px] text-slate-600 mt-0.5'},`${lat.toFixed(4)}° · ${lng.toFixed(4)}°${scaleGLB!==1?' · ×'+scaleGLB.toFixed(1)+'='+effRad+'m':''}`)),
      syncInfo.msg&&h('span',{className:`text-[9px] px-2 py-1 bg-slate-900 rounded ${syncInfo.cls}`},syncInfo.msg)
    ),
    h('div',{className:'flex-1 overflow-y-auto kv-scroll flex flex-col gap-3'},
      h(MiniSolarChart,{lat,lng,doy,sunRes:sunNow,seas}),
      h('div',{className:'grid grid-cols-3 gap-2'},
        ...[{e:'☀',l:'Verão',ac:doy===seas.sum,bc:'amber',fn:()=>setDoy(seas.sum),sub:seas.sumLbl.split(' ')[1]},{e:'❄',l:'Inverno',ac:doy===seas.win,bc:'sky',fn:()=>setDoy(seas.win),sub:seas.winLbl.split(' ')[1]},{e:'◎',l:'Equinócio',ac:eqActive,bc:'emerald',fn:()=>setDoy(d=>d===79?266:79),sub:eqSub}].map(({e,l,ac,bc,fn,sub})=>{
          const C={amber:{b:'border-amber-500/25',t:'text-amber-400',bg:'bg-amber-500/10'},sky:{b:'border-sky-500/25',t:'text-sky-400',bg:'bg-sky-500/10'},emerald:{b:'border-emerald-500/25',t:'text-emerald-400',bg:'bg-emerald-500/10'}}[bc];
          return h('button',{key:l,onClick:fn,className:`flex flex-col items-center py-2 px-1 rounded border transition-all ${C.b} ${ac?C.bg:'bg-transparent hover:bg-white/[.02]'}`},h('span',{className:'text-sm leading-none'},e),h('span',{className:`text-[10px] font-semibold ${C.t}`},l),h('span',{className:'text-[9px] text-slate-600'},sub));
        })
      ),
      h('div',{className:'bg-[#111827] rounded-lg border border-slate-800 p-3 flex flex-col gap-4'},
        ...[{l:'Horário',v:fmtH(hr),min:0,max:23.99,step:.25,val:hr,fn:v=>setHr(+v)},{l:'Data',v:fmtD(doy),min:1,max:365,step:1,val:doy,fn:v=>setDoy(+v)},{l:'Raio GLB',v:rad+'m',min:50,max:500,step:10,val:rad,fn:v=>setRad(+v)}].map(({l,v,min,max,step,val,fn})=>h('div',{key:l},h('div',{className:'flex justify-between text-[11px] mb-2'},h('span',{className:'text-slate-400'},l),h('span',{className:'text-amber-400'},v)),h('input',{type:'range',className:'kv-slider',min,max,step,value:val,onChange:e=>fn(e.target.value)}))),
        h('div',null,
          h('div',{className:'flex justify-between text-[11px] mb-2'},h('span',{className:'text-slate-400'},'Escala GLB no Projeto'),h('span',{className:'text-amber-400'},`×${scaleGLB.toFixed(1)} → ${effRad}m`)),
          h('input',{type:'range',className:'kv-slider',min:0.1,max:5,step:0.1,value:scaleGLB,onChange:e=>setScaleGLB(parseFloat(e.target.value))}),
          h('p',{className:'text-[9px] text-slate-600 mt-1'},'Se escalou o GLB no Giraffe, ajuste aqui para alinhar os layers')

      ),
      h('button',{
        onClick:()=>setSelectMode(v=>!v),
        className:`w-full py-2 rounded border text-[11px] font-semibold uppercase tracking-wider transition-all ${selectMode?'border-red-500/60 bg-red-500/10 text-red-400 animate-pulse':'border-slate-700 bg-slate-800/50 text-slate-400 hover:border-slate-600'}`
      },selectMode?'⌖ Clique no mapa para selecionar centro...':'⌖ Selecionar Centro (clique no objeto GLB)'),
      h('div',{className:'p-3 bg-[#111827] rounded-lg border border-slate-800 mb-1'},
        h('div',{className:'flex items-center justify-between mb-3'},
          h('div',null,h('span',{className:'text-sm font-medium text-slate-300'},'Carta Solar no Mapa 3D'),h('p',{className:'text-[10px] text-slate-600 mt-0.5'},showChart?'Ligado — layers visíveis':'Desligado (padrão)')),
          h('button',{className:`toggle ${showChart?'on':''}`,onClick:()=>setShowChart(v=>!v)})
        ),
        h('div',{className:'flex gap-2 mb-2'},
          h('button',{className:`flex-1 py-2 rounded border border-amber-500/30 bg-amber-500/10 text-amber-500 text-[10px] font-bold uppercase tracking-wider hover:bg-amber-500/20 transition-colors ${isBaking?'opacity-50 cursor-wait':''}`,onClick:()=>handleBake('layer')},'⇩ Fixar Camada'),
          h('button',{className:`flex-1 py-2 rounded border border-emerald-500/30 bg-emerald-500/10 text-emerald-500 text-[10px] font-bold uppercase tracking-wider hover:bg-emerald-500/20 transition-colors ${isBaking?'opacity-50 cursor-wait':''}`,onClick:()=>handleBake('raw')},'✏️ Fixar Editável')
        ),
        h('button',{
          onClick:()=>{if(glbBusy)return;setGlbBusy(true);setTimeout(()=>{downloadSolarGLB(lat,lng,rad);setGlbBusy(false);},100);},
          disabled:glbBusy,
          className:`w-full py-2 rounded border border-sky-500/30 bg-sky-500/10 text-sky-400 text-[10px] font-bold uppercase tracking-wider hover:bg-sky-500/20 transition-colors ${glbBusy?'opacity-50 cursor-wait':''}`
        },glbBusy?'⟳ Gerando GLB...':'⇩ Baixar Carta Solar GLB')
      )

  );
}
